<header th:fragment="header">
    <div class="top-header">
        <div class="marquee">
                <span>
                    <i class="fa-regular fa-handshake"></i>
                    Chào mừng đến với cửa hàng SellLP - <i class="fa-solid fa-award"></i> Sản phẩm chính hãng -
                    <i class="fa-solid fa-truck-fast"></i> - Giao hàng nhanh chóng
                </span>
        </div>
    </div>

    <div class="main-header">

        <div class="logo">
            <h1><a href="/home">SellLP</a></h1>
        </div>

        <div class="category">
            <button id="categoryBtn">
                <i class="fa-solid fa-bars"></i> Danh mục
            </button>
        </div>

        <div class="search">
            <form th:action="@{/products}" method="get" style="display: flex; width: 100%; align-items: center;">
                <input type="hidden" name="categoryId" th:value="${categoryId}">
                <input type="hidden" name="sort" th:value="${sort}">

                <input type="text" name="keyword" th:value="${keyword}"
                       placeholder="Bạn muốn mua gì hôm nay?">

                <button type="submit" class="search-btn">
                    <i class="fa-solid fa-search"></i>
                </button>
            </form>
        </div>

        <ul class="menu">
            <li>
                <a href="/home">
                    <i class="fa-solid fa-house"></i> Trang chủ
                </a>
            </li>

            <li>
                <a href="/products">
                    <i class="fa-solid fa-box"></i> Sản phẩm
                </a>
            </li>

            <li>
                <a href="/introduction">
                    <i class="fa-solid fa-circle-info"></i> Giới thiệu
                </a>
            </li>

            <li>
                <a href="/history-order">
                    <i class="fa-solid fa-receipt"></i> Đơn hàng
                </a>
            </li>

            <li>
                <div class="cart">
                    <a href="/cart">
                        <i class="fa-solid fa-cart-shopping"></i> Giỏ hàng
                    </a>
                </div>
            </li>

            <li th:if="${username == null}">
                <a href="/login">
                    <i class="fa-solid fa-right-to-bracket"></i> Đăng nhập
                </a>
            </li>

            <div th:replace="~{fragments/user-menu :: li}"></div>
            <div th:replace="~{fragments/notification :: li}"></div>
        </ul>
    </div>
    <div th:if="${success != null}" class="toast success"
         style="position:fixed; top:25px; right:20px; background:green; color:white; padding:15px;">
        <i class="fa-solid fa-check"></i>
        <span th:text="${success}"></span>
    </div>
    <div th:replace="~{fragments/contact-popup::div}"></div>

</header>
