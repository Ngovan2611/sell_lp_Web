<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Thông tin cá nhân</title>

    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/profile.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">


    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>
<div class="breadcrumb">
    <a th:href="@{/home}">Trang chủ</a>  >
    <span>Thông tin cá nhân</span>
</div>
<div id="overlay"></div>
<div th:replace="~{fragments/sidebar :: aside}"></div>

<div class="profile-container">

    <h2 class="profile-title">Thông tin cá nhân</h2>

    <form th:action="@{/profile/update}" th:object="${user}" method="post">

        <input type="hidden" th:field="*{userId}">

        <div class="form-group">
            <label>Tên đăng nhập</label>
            <input type="text" th:field="*{username}" readonly>
        </div>

        <div class="form-group">
            <label>Họ và tên</label>
            <input type="text" th:field="*{fullName}" class="form-control">
        </div>

        <div class="form-group">
            <label>Email</label>
            <div class="email-auth-wrapper">
                <input type="email" id="emailInput" th:field="*{email}"
                       class="form-control">

                <button type="button" id="btnSendOtp" class="btn-verify"
                        th:if="${user.email == null || user.email == ''}"
                        onclick="sendOtp()">
                    Xác thực
                </button>
            </div>
        </div>

        <div class="form-group otp-container" id="otpGroup" style="display: none;">
            <label><i class="fas fa-shield-alt"></i> Xác nhận mã OTP</label>
            <div class="otp-input-group">
                <input type="text" id="otpInput" class="form-control"
                       placeholder="Mã 6 số" maxlength="6">
                <button type="button" class="btn-verify-otp" onclick="verifyOtp()">
                    Xác nhận
                </button>
            </div>
            <div id="otpTimer" class="otp-timer"></div>
        </div>

        <div class="form-group">
            <label>Số điện thoại</label>
            <input type="text" th:field="*{phone}" class="form-control">        </div>

        <div class="form-group">
            <label>Ngày tạo tài khoản</label>
            <input type="text"
                   th:value="${#dates.format(user.createdAt,'dd/MM/yyyy')}"
                   readonly>
        </div>

        <div class="form-group">
            <label>Trạng thái</label>
            <input type="text"
                   th:value="${user.active ? 'Khóa' : 'Hoạt động'}"
                   readonly>
        </div>

        <div class="form-actions">
            <button class="btn btn-primary">Cập nhật</button>
        </div>

    </form>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/common.js}"></script>
<script>
    function sendOtp() {
        const email = document.getElementById("emailInput").value;
        const btn = document.getElementById("btnSendOtp");

        if (!email) {
            alert("Vui lòng nhập email trước khi xác thực!");
            return;
        }

        btn.disabled = true;
        btn.innerText = "Đang kiểm tra...";

        const params = new URLSearchParams({ email: email });

        fetch(`/api/auth/send-otp?${params.toString()}`, { method: 'POST' })
            .then(async response => {
                const message = await response.text();

                if (response.ok) {
                    document.getElementById("otpGroup").style.display = "block";
                    alert(message);
                    startTimer(60);
                } else {
                    alert("Lỗi: " + message);
                    btn.disabled = false;
                    btn.innerText = "Xác thực";
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert("Không thể kết nối đến máy chủ.");
                btn.disabled = false;
                btn.innerText = "Xác thực";
            });
    }

    function verifyOtp() {
        const email = document.getElementById("emailInput").value;
        const otp = document.getElementById("otpInput").value;

        fetch(`/api/auth/verify-otp?email=${email}&otp=${otp}`, { method: 'POST' })
            .then(response => {
                if (response.ok) {
                    alert("Xác thực thành công!");
                    document.getElementById("otpGroup").style.display = "none";
                    document.getElementById("emailInput").readOnly = true;
                    document.getElementById("btnSendOtp").remove();
                } else {
                    alert("Mã OTP không chính xác!");
                }
            });
    }

    function startTimer(duration) {
        let timer = duration;
        const display = document.getElementById("otpTimer");
        const btn = document.getElementById("btnSendOtp");

        const interval = setInterval(() => {
            display.innerText = `Vui lòng đợi ${timer}s để gửi lại mã.`;
            if (--timer < 0) {
                clearInterval(interval);
                display.innerText = "";
                btn.disabled = false;
                btn.innerText = "Xác thực";
            }
        }, 1000);
    }
    document.getElementById('otpInput').addEventListener('input', function (e) {
        this.value = this.value.replace(/[^0-9]/g, '').slice(0, 6);
    });
</script>

</body>
</html>
