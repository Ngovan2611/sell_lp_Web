<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>

    <meta charset="UTF-8">
    <title>SellLP - Shop Laptop & PC</title>
    <link rel="stylesheet" th:href="@{/css/user/main.css}">
    <link rel="stylesheet" th:href="@{/css/user/common.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>
<div th:replace="~{fragments/header :: header}"></div>

<div id="overlay"></div>
    <div class="hero">

        <div th:replace="~{fragments/sidebar :: aside}"></div>

        <section class="banner">
            <div class="banner-slider">
                <a th:each="b, iterStat : ${banners}" th:href="${b.linkUrl}">
                    <img th:src="${b.imageUrl}"
                         th:class="${iterStat.index == 0} ? 'banner-slide active' : 'banner-slide'"
                         th:alt="${b.title}">
                </a>

                <th:block th:if="${#lists.isEmpty(banners)}">
                    <img src="/images/banner1.jpg" class="banner-slide active">
                    <img src="/images/banner2.jpg" class="banner-slide">
                    <img src="/images/banner3.jpg" class="banner-slide">
                </th:block>
            </div>
        </section>

        <aside class="sidebar">
            <h3> <span style="color: #c42f2f;"><i class="fa-solid fa-graduation-cap"></i></span> Chào mừng bạn đến với
                SellLP</h3>
            <ul>
                <li><span style="color: #c42f2f;"><i class="fa-solid fa-gift"></i></span> Quà chào mừng</li>
                <li th:if="${username == null}">
                    <a  href="/login">
                    <span style="color: #c42f2f;">Đăng nhập</span>
                    </a> hoặc
                    <a href="/register">
                        <span style="color: #c42f2f;">Đăng kí</span>
                    </a>
                </li>
                <li th:if="${username != null}">
                    <a  href="/present">
                        <i style="color: red" class="fa-solid fa-hand-holding-dollar"></i>
                        <span style="color: #c42f2f;">Nhận ngay</span>
                    </a> quà tặng hấp dẫn
                </li>

            </ul>
        </aside>
    </div>

    <section class="container">

        <h2 style="margin-bottom:20px;">Sản phẩm Laptop thịnh hành</h2>
        <div class="products-wrapper">
            <div class="products">
                <div class="product"
                     th:each="p : ${laps}"
                     th:data-id="${p.productId}">
                    <img th:src="@{{img}(img=${p.imageUrl})}">

                    <h3 th:text="${p.name}"></h3>

                    <p th:text="${p.description}"></p>

                    <a th:href="@{/product/{id}(id=${p.productId})}">
                        <button class="view-btn">
                            Xem chi tiết
                        </button>
                    </a>
                </div>
            </div>
        </div>





        <div class="view-more">
            <a th:href="@{/products(categoryId=1)}">
                <button class="view-btn">
                    <i class="fa-solid fa-arrow-right"></i>
                    Xem tất cả sản phẩm
                </button>
            </a>
        </div>


    </section>
    <section class="container">

        <h2 style="margin-bottom:20px;">Sản phẩm PC thịnh hành</h2>

        <div class="products">

            <div class="product"
                 th:each="p : ${desks}"
                 th:data-id="${p.productId}">
                    <img th:src="@{{img}(img=${p.imageUrl})}">
                    <h3 th:text="${p.name}"></h3>
                    <p th:text="${p.description}"></p>

                    <a th:href="@{/product/{id}(id=${p.productId})}">
                        <button class="view-btn">Xem chi tiết</button>
                    </a>
                </div>
        </div>

        <div class="view-more">
            <a th:href="@{/products(categoryId=2)}">
                <button class="view-btn">
                    <i class="fa-solid fa-arrow-right"></i>
                    Xem tất cả sản phẩm
                </button>
            </a>
        </div>

    </section>
<section class="container">

    <h2 style="margin-bottom:20px;">
        <i class="fa-solid fa-newspaper"></i> Tin tức công nghệ
    </h2>

    <div th:each="n, iterStat : ${newsList}"
         th:class="${iterStat.index % 2 == 1} ? 'news-row reverse' : 'news-row'">

        <div class="news-text">
            <h3 th:text="${n.title}">Tiêu đề bài viết</h3>

            <p th:text="${n.shortDescription}" class="news-short-desc"></p>

            <div th:utext="${n.content}" class="news-full-content" style="margin-bottom: 15px; color: #4a5568; line-height: 1.6;">
                Nội dung chi tiết bài viết...
            </div>

            <a th:href="@{/news/{id}(id=${n.id})}">
                <button class="news-btn">
                    <i class="fa-solid fa-eye"></i> Xem chi tiết
                </button>
            </a>
        </div>

        <div class="news-image">
            <img th:src="${n.thumbnail}" th:alt="${n.title}">
        </div>
    </div>

    <th:block th:if="${#lists.isEmpty(newsList)}">
        <p style="text-align: center; color: #64748b; font-style: italic; margin: 30px 0;">
            Hiện tại chưa có tin tức công nghệ mới cập nhật.
        </p>
    </th:block>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>


</body>
<script th:src="@{/js/user/main.js}"></script>
<script th:src="@{/js/user/common.js}"></script>

</html>
