<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý người dùng - Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/admin/admin-common.css}">
    <link rel="stylesheet" th:href="@{/css/admin/user-manage.css}">


</head>
<body>

<div th:replace="~{fragments/admin-header :: div}"></div>

<div class="main-content">
    <div class="container-fluid">

        <div class="page-header">
            <h2><i class="fas fa-users-cog"></i> Quản lý khách hàng</h2>
            <div class="search-box">
                <form th:action="@{/admin/users}" method="get">
                    <input type="text" name="keyword" th:value="${keyword}" placeholder="Tìm tên, email, sđt...">
                    <button type="submit"><i class="fas fa-search"></i></button>
                </form>
            </div>
        </div>

        <div class="table-responsive">
            <table class="admin-table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>Họ và tên</th>
                    <th>Email</th>
                    <th>Trạng thái</th>
                    <th>Ngày tạo</th>
                    <th>Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="user : ${users}">
                    <td th:text="${user.userId}">1</td>
                    <td th:text="${user.username}" class="fw-bold">user123</td>
                    <td th:text="${user.fullName}">Nguyễn Văn A</td>
                    <td th:text="${user.email}">user@gmail.com</td>
                    <td>
                        <span th:if="${user.active}" class="status-active">
                            <i class="fas fa-check-circle"></i> Hoạt động
                        </span>
                        <span th:unless="${user.active}" class="status-locked">
                            <i class="fas fa-lock"></i> Đã khóa
                        </span>
                    </td>
                    <td th:text="${#dates.format(user.createdAt, 'dd/MM/yyyy')}">20/03/2026</td>
                    <td class="actions">
                        <button type="button" class="btn-toggle" th:data-id="${user.userId}"
                                th:title="${user.active ? 'Khóa tài khoản' : 'Mở khóa'}" onclick="handleToggle(this)">
                            <i th:class="${user.active ? 'fas fa-user-slash' : 'fas fa-user-check'}"></i>
                        </button>

                        <button type="button" class="btn-notify" th:data-id="${user.userId}"
                                th:data-name="${user.fullName}" onclick="openNotifyModal(this)">
                            <i class="fas fa-bell"></i>
                        </button>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(users)}">
                    <td colspan="7" style="text-align: center; color: var(--text-sub); padding: 30px;">
                        Không tìm thấy khách hàng nào phù hợp.
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="pagination" th:if="${totalPages > 1}">
            <ul>
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a class="page-link page-link-nav" th:href="@{/admin/users(page=${currentPage - 1}, keyword=${keyword})}">
                        <i class="fas fa-chevron-left"></i> Trước
                    </a>
                </li>

                <li class="page-item" th:each="pageNumber : ${#numbers.sequence(0, totalPages - 1)}"
                    th:classappend="${pageNumber == currentPage} ? 'active'">
                    <a class="page-link" th:href="@{/admin/users(page=${pageNumber}, keyword=${keyword})}" th:text="${pageNumber + 1}">1</a>
                </li>

                <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                    <a class="page-link page-link-nav" th:href="@{/admin/users(page=${currentPage + 1}, keyword=${keyword})}">
                        Tiếp <i class="fas fa-chevron-right"></i>
                    </a>
                </li>
            </ul>
        </div>

    </div>
</div>
<!-- =========================
     NOTIFICATION MODAL
========================= -->

<div id="notifyModal" class="notify-modal">

    <div class="notify-box">

        <div class="notify-header">
            <h3>
                <i class="fas fa-bell"></i>
                Gửi thông báo
            </h3>

            <button onclick="closeNotifyModal()">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <div class="notify-body">

            <input type="hidden" id="notifyUserId">

            <div class="form-group">
                <label>Người nhận</label>
                <input type="text" id="notifyUserName" disabled>
            </div>

            <div class="form-group">
                <label>Tiêu đề</label>
                <input type="text" id="notifyTitle"
                       placeholder="Nhập tiêu đề">
            </div>

            <div class="form-group">
                <label>Nội dung</label>
                <textarea id="notifyMessage"
                          rows="5"
                          placeholder="Nhập nội dung thông báo"></textarea>
            </div>

            <button class="send-btn"
                    onclick="sendNotification()">

                <i class="fas fa-paper-plane"></i>
                Gửi thông báo

            </button>

        </div>

    </div>

</div>
<script>

    /* =========================
       TOGGLE USER STATUS
    ========================= */

    function handleToggle(button) {

        const userId = button.getAttribute('data-id');

        if (confirm("Bạn có chắc chắn muốn thay đổi trạng thái người dùng này?")) {

            fetch(`/admin/users/toggle-status/${userId}`, {
                method: 'POST'
            })
                .then(response => {

                    if (response.ok) {
                        location.reload();
                    } else {
                        alert("Có lỗi xảy ra.");
                    }

                })
                .catch(error => {

                    console.error(error);

                    alert("Lỗi máy chủ.");

                });

        }

    }

    /* =========================
       MODAL
    ========================= */

    function openNotifyModal(button){

        const modal = document.getElementById("notifyModal");

        document.getElementById("notifyUserId").value =
            button.dataset.id;

        document.getElementById("notifyUserName").value =
            button.dataset.name;

        modal.classList.add("active");
    }

    function closeNotifyModal(){

        document.getElementById("notifyModal")
            .classList.remove("active");

    }

    /* =========================
       SEND NOTIFICATION
    ========================= */

    function sendNotification(){

        const userId =
            document.getElementById("notifyUserId").value;

        const title =
            document.getElementById("notifyTitle").value;

        const message =
            document.getElementById("notifyMessage").value;

        if(!title || !message){

            alert("Vui lòng nhập đầy đủ.");

            return;
        }

        fetch(`/admin/notifications/send/${userId}`,{

            method:'POST',

            headers:{
                'Content-Type':'application/json'
            },

            body:JSON.stringify({

                title:title,
                message:message,
                type:'OTHER'

            })

        })
            .then(response => {

                if(response.ok){

                    alert("Gửi thông báo thành công.");

                    closeNotifyModal();

                }else{

                    alert("Không thể gửi thông báo.");

                }

            })
            .catch(error => {

                console.error(error);

                alert("Lỗi máy chủ.");

            });

    }

</script>
<script th:src="@{/js/admin-common.js}"></script>

</body>
</html>
