<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý danh mục | SellLP Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/admin/admin-common.css}">
    <link rel="stylesheet" th:href="@{/css/admin/categories-manage.css}">
    <link rel="icon" href="data:,">
</head>
<body>
<div th:replace="~{fragments/admin-header :: div}"></div>

<div class="main-content">
    <div class="category-container">
        <div class="admin-card">
            <div class="card-header">
                <h2><i class="fa-solid fa-list"></i> Danh sách danh mục</h2>
                <button class="btn-add-new" onclick="openModalForCreate()">
                    <i class="fa-solid fa-plus"></i> Thêm danh mục
                </button>
            </div>

            <table class="custom-table">
                <thead>
                <tr>
                    <th class="col-id">ID</th>
                    <th class="col-icon">Icon</th>
                    <th class="col-name">Tên danh mục</th>
                    <th class="col-variant">Loại biến thể</th>
                    <th class="col-status">Hiển thị (User)</th>
                    <th class="col-action">Hành động</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="cat : ${categories}">
                    <td th:text="${cat.categoryId}">1</td>
                    <td class="cell-center">
                        <i th:class="'fa-solid ' + ${cat.icon} + ' icon-preview'"></i>
                    </td>
                    <td class="cell-bold" th:text="${cat.categoryName}">laptop</td>

                    <td class="cell-center">
                        <span th:if="${cat.hasSpecs}" class="badge badge-info">
                            <i class="fa-solid fa-microchip"></i> Đồ công nghệ (RAM/ROM)
                        </span>
                        <span th:unless="${cat.hasSpecs}" class="badge badge-secondary">
                            <i class="fa-solid fa-boxes-stacked"></i> Thường (Chỉ màu sắc)
                        </span>
                    </td>

                    <td class="cell-center">
                        <span th:if="${cat.isDisplayed}" class="badge badge-success">
                            <i class="fa-solid fa-eye"></i> Đang hiện
                        </span>
                        <span th:unless="${cat.isDisplayed}" class="badge badge-danger">
                            <i class="fa-solid fa-eye-slash"></i> Đang ẩn
                        </span>
                    </td>
                    <td class="cell-center">
                        <button class="btn-action btn-edit" title="Sửa"
                                th:attr="data-id=${cat.categoryId},
                                         data-name=${cat.categoryName},
                                         data-icon=${cat.icon},
                                         data-displayed=${cat.isDisplayed},
                                         data-has-specs=${cat.hasSpecs}"
                                onclick="openModalForEdit(this)">
                            <i class="fa-solid fa-pen-to-square"></i>
                        </button>

                        <button class="btn-action btn-delete" title="Xóa"
                                th:attr="data-id=${cat.categoryId}, data-name=${cat.categoryName}"
                                onclick="confirmDeleteCategory(this)">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div id="categoryModal" class="modal-overlay">
    <div class="modal-box">
        <div class="modal-header">
            <h3 id="modalTitle">Thêm danh mục mới</h3>
            <button class="btn-close-modal" onclick="closeModal()">&times;</button>
        </div>

        <form id="categoryForm">
            <input type="hidden" id="categoryId">

            <div class="form-group">
                <label>Tên danh mục <span class="required-star">*</span></label>
                <input type="text" id="categoryName" class="form-control" placeholder="Ví dụ: laptop, bàn phím..." required>
            </div>

            <div class="form-group">
                <label>Mã Icon FontAwesome <span class="required-star">*</span></label>
                <div class="icon-input-wrapper">
                    <input type="text" id="categoryIcon" class="form-control" placeholder="fa-keyboard" required oninput="previewIconLive(this.value)">
                    <span class="live-preview-box"><i id="liveIcon" class="fa-solid fa-eye"></i></span>
                </div>
                <div class="helper-text-container">
                    <span class="helper-text-lead">Vd: fa-laptop</span>
                    <a href="https://fontawesome.com/v6/search?o=r&m=free" target="_blank" class="helper-link">Tìm mã icon</a>
                </div>
            </div>

            <div class="form-group">
                <label>Đặc tính sản phẩm</label>
                <div class="form-check">
                    <input type="checkbox" id="categoryHasSpecs">
                    <label for="categoryHasSpecs">Sản phẩm công nghệ (Yêu cầu nhập thông số RAM, ROM khi tạo biến thể)</label>
                </div>
            </div>

            <div class="form-group">
                <label>Cấu hình hiển thị</label>
                <div class="form-check">
                    <input type="checkbox" id="categoryDisplayed">
                    <label for="categoryDisplayed">Cho phép hiển thị ngoài thanh Menu của User</label>
                </div>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn-cancel" onclick="closeModal()">Hủy</button>
                <button type="submit" class="btn-submit">Lưu lại</button>
            </div>
        </form>
    </div>
</div>

<div id="success-box" class="notification-box">
    <p class="notification-content"><span id="success-text"></span></p>
</div>

<script>
    let isEditMode = false;

    function previewIconLive(className) {
        const liveIcon = document.getElementById("liveIcon");
        liveIcon.className = className.trim() === "" ? "fa-solid fa-eye" : "fa-solid " + className;
    }

    function openModalForCreate() {
        isEditMode = false;
        document.getElementById("categoryForm").reset();
        document.getElementById("categoryId").value = "";
        document.getElementById("categoryHasSpecs").checked = false; // Mặc định tạo mới là danh mục thường
        document.getElementById("categoryDisplayed").checked = true;
        document.getElementById("modalTitle").innerText = "Thêm danh mục mới";
        previewIconLive("");
        document.getElementById("categoryModal").classList.add("show");
    }

    function openModalForEdit(btn) {
        isEditMode = true;
        document.getElementById("categoryId").value = btn.dataset.id;
        document.getElementById("categoryName").value = btn.dataset.name;
        document.getElementById("categoryIcon").value = btn.dataset.icon;

        // Đọc cấu hình logic trạng thái hiển thị và thông số kĩ thuật ẩn từ nút bấm
        const displayedValue = String(btn.dataset.displayed).trim().toLowerCase();
        document.getElementById("categoryDisplayed").checked = (displayedValue === "true");

        const hasSpecsValue = String(btn.dataset.hasSpecs).trim().toLowerCase();
        document.getElementById("categoryHasSpecs").checked = (hasSpecsValue === "true");

        document.getElementById("modalTitle").innerText = "Chỉnh sửa danh mục #" + btn.dataset.id;
        previewIconLive(btn.dataset.icon);
        document.getElementById("categoryModal").classList.add("show");
    }

    function closeModal() {
        document.getElementById("categoryModal").classList.remove("show");
    }

    window.addEventListener("click", function(e) {
        const modal = document.getElementById("categoryModal");
        if (e.target === modal) {
            closeModal();
        }
    });

    function confirmDeleteCategory(button) {
        const id = button.dataset.id;
        const name = button.dataset.name;

        if (confirm(`Bạn có chắc chắn muốn xóa danh mục "${name}" (ID: ${id}) không?`)) {
            fetch(`/admin/categories/api/delete/${id}`, {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' }
            })
                .then(res => {
                    if (res.ok) return res.text();
                    return res.text().then(text => { throw new Error(text) });
                })
                .then(message => {
                    alert(message);
                    window.location.reload();
                })
                .catch(error => {
                    alert("Lỗi: " + error.message);
                });
        }
    }

    // Xử lý Thêm mới / Cập nhật dữ liệu gửi API về Backend
    document.getElementById("categoryForm").addEventListener("submit", function(e) {
        e.preventDefault();

        const id = document.getElementById("categoryId").value;
        const name = document.getElementById("categoryName").value;
        const icon = document.getElementById("categoryIcon").value;
        const isDisplayed = document.getElementById("categoryDisplayed").checked;
        const hasSpecs = document.getElementById("categoryHasSpecs").checked; // Lấy dữ liệu checkbox đặc tính sản phẩm

        const payload = {
            categoryName: name,
            icon: icon,
            isDisplayed: isDisplayed,
            hasSpecs: hasSpecs // Đóng gói dữ liệu đẩy lên Backend Controller nhận xử lý
        };

        const url = isEditMode ? `/admin/categories/update/${id}` : '/admin/categories/save';
        const method = isEditMode ? 'PUT' : 'POST';

        fetch(url, {
            method: method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
            .then(res => {
                if (res.ok) return res.text();
                return res.text().then(text => { throw new Error(text) });
            })
            .then(message => {
                alert(message);
                closeModal();
                window.location.reload();
            })
            .catch(error => {
                alert("Lỗi hệ thống: " + error.message);
            });
    });
</script>
<script th:src="@{/js/admin-common.js}"></script>

</body>
</html>
