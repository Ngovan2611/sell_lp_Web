<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý sản phẩm | SellLP Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/admin/admin-common.css}">
    <link rel="stylesheet" th:href="@{/css/admin/admin-product.css}">

    <link href="https://cdn.jsdelivr.net/npm/@yaireo/tagify/dist/tagify.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@yaireo/tagify"></script>

</head>
<body>
<div th:replace="~{fragments/admin-header :: div}"></div>

<div class="main-content">
    <div class="admin-product-manager">

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon icon-blue"><i class="fas fa-box"></i></div>
                <div>
                    <p class="stat-label">Tổng sản phẩm</p>
                    <h3 th:text="${totalItems}">0</h3>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon icon-yellow"><i class="fas fa-history"></i></div>
                <div>
                    <p class="stat-label">Sắp hết hàng</p>
                    <h3 th:text="${lowStockCount}">0</h3>
                </div>
            </div>
        </div>

        <div class="product-card">
            <div class="toolbar">

                <form th:action="@{/admin/products}" method="get" class="admin-filter-form">

                    <input type="text"
                           name="keyword"
                           th:value="${keyword}"
                           placeholder="Tìm sản phẩm..."
                           class="form-input search-input">

                    <select name="category" class="form-select">
                        <option value="">Tất cả danh mục</option>
                        <option th:each="cat : ${categories}"
                                th:value="${cat.categoryId}"
                                th:text="${cat.categoryName}"
                                th:selected="${selectedCategory == cat.categoryId}">
                        </option>
                    </select>

                    <select name="tag" class="form-select">
                        <option value="">Tất cả nhãn Tag</option>
                        <option th:each="t : ${tags}"
                                th:value="${t.slug}"
                                th:text="${t.name}"
                                th:selected="${selectedTag == t.slug}">
                        </option>
                    </select>

                    <select name="stock" class="form-select">
                        <option value="">Tất cả kho</option>
                        <option value="in" th:selected="${stock == 'in'}">Còn hàng</option>
                        <option value="low" th:selected="${stock == 'low'}">Sắp hết</option>
                        <option value="out" th:selected="${stock == 'out'}">Hết hàng</option>
                    </select>

                    <select name="active" class="form-select">
                        <option value="">Tất cả trạng thái</option>
                        <option value="true" th:selected="${active == true}">Đang bán</option>
                        <option value="false" th:selected="${active == false}">Ngừng bán</option>
                    </select>

                    <select name="sort" class="form-select">
                        <option value="newest" th:selected="${sort == 'newest'}">Mới nhất</option>
                        <option value="price_asc" th:selected="${sort == 'price_asc'}">Giá tăng dần</option>
                        <option value="price_desc" th:selected="${sort == 'price_desc'}">Giá giảm dần</option>
                        <option value="name_asc" th:selected="${sort == 'name_asc'}">A-Z</option>
                    </select>

                    <button type="submit" class="btn-filter">
                        <i class="fas fa-filter"></i> Lọc
                    </button>

                </form>

                <a th:href="@{/admin/products/add}" class="btn-add">
                    <i class="fas fa-plus-circle"></i> THÊM MỚI
                </a>

            </div>
            <table class="custom-table">
                <thead>
                <tr>
                    <th class="col-icon">#</th>
                    <th>Thông tin sản phẩm</th>
                    <th>Danh mục</th>
                    <th>Giá thấp nhất</th>
                    <th>Kho</th>
                    <th class="col-action">Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <th:block th:each="p : ${products}">
                    <tr class="product-row" th:onclick="'toggleVariant(' + ${p.productId} + ')'">
                        <td class="col-icon">
                            <i class="fas fa-chevron-right" th:id="'icon-' + ${p.productId}"></i>
                        </td>
                        <td>
                            <div class="product-info-cell">
                                <img th:src="${p.imageUrl}" class="product-img">
                                <div>
                                    <b th:text="${p.name}"></b><br>
                                    <small class="text-muted" th:text="'ID: #' + ${p.productId}"></small>
                                </div>
                            </div>
                        </td>
                        <td th:text="${p.category != null ? p.category.categoryName : 'N/A'}"></td>
                        <td>
                            <span class="price-text" th:text="${#numbers.formatDecimal(p.getMinPrice(), 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                        </td>
                        <td>
                            <span class="badge-stock"
                                  th:classappend="${p.getTotalStock() > 10 ? 'in-stock' : (p.getTotalStock() > 0 ? 'low-stock' : 'out-stock')}"
                                  th:text="${p.getTotalStock()}"></span>
                        </td>
                        <td class="col-action">
                            <button class="btn-filter btn-edit-mini"
                                    th:onclick="'event.stopPropagation(); openEditModal(' + ${p.productId} + ')'">
                                <i class="fas fa-edit"></i>
                            </button>
                        </td>
                    </tr>

                    <tr th:id="'variant-' + ${p.productId}" class="variant-hidden-row" style="display: none;">
                        <td colspan="6">
                            <div class="variant-detail-wrapper">
                                <p class="variant-title">DANH SÁCH PHIÊN BẢN</p>
                                <table class="inner-variant-table">
                                    <thead>
                                    <tr>
                                        <th>SKU</th>
                                        <th>Cấu hình</th>
                                        <th>Giá bán</th>
                                        <th>Kho</th>
                                    </tr>
                                    </thead>
                                    <tbody>
                                    <tr th:each="v : ${p.variants}">
                                        <td th:text="'#' + ${v.variantId}"></td>
                                        <td>
                                            <span th:text="${v.colorName ?: 'Màu mặc định'}"></span>
                                            <span th:text="${v.ramSize ?: ''}"></span>
                                            <span th:text="${v.romSize ?: ''}"></span>
                                        </td>
                                        <td class="v-price-bold" th:text="${#numbers.formatDecimal(v.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                                        <td th:text="${v.stockQty}"></td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>
                        </td>
                    </tr>
                </th:block>
                </tbody>
            </table>

            <div class="pagination-container" th:if="${totalPages > 1}">
                <a class="page-link"
                   th:classappend="${currentPage <= 1} ? 'disabled' : ''"
                   th:href="@{/admin/products(page=${currentPage - 1}, keyword=${keyword}, category=${selectedCategory}, tag=${selectedTag}, stock=${stock}, active=${active}, sort=${sort})}">
                    <i class="fas fa-chevron-left"></i>
                </a>

                <a class="page-link"
                   th:classappend="${1 == currentPage} ? 'active' : ''"
                   th:href="@{/admin/products(page=1, keyword=${keyword}, category=${selectedCategory}, tag=${selectedTag}, stock=${stock}, active=${active}, sort=${sort})}">
                    1
                </a>

                <span class="page-link disabled" th:if="${currentPage > 3}">...</span>

                <th:block th:each="i : ${#numbers.sequence(1, totalPages)}">
                    <a class="page-link"
                       th:if="${i > 1 && i < totalPages && i >= currentPage - 1 && i <= currentPage + 1}"
                       th:classappend="${i == currentPage} ? 'active' : ''"
                       th:href="@{/admin/products(page=${i}, keyword=${keyword}, category=${selectedCategory}, tag=${selectedTag}, stock=${stock}, active=${active}, sort=${sort})}"
                       th:text="${i}">
                    </a>
                </th:block>

                <span class="page-link disabled" th:if="${currentPage < totalPages - 2}">...</span>

                <a class="page-link"
                   th:classappend="${totalPages == currentPage} ? 'active' : ''"
                   th:href="@{/admin/products(page=${totalPages}, keyword=${keyword}, category=${selectedCategory}, tag=${selectedTag}, stock=${stock}, active=${active}, sort=${sort})}"
                   th:text="${totalPages}">
                </a>

                <a class="page-link"
                   th:classappend="${currentPage >= totalPages} ? 'disabled' : ''"
                   th:href="@{/admin/products(page=${currentPage + 1}, keyword=${keyword}, category=${selectedCategory}, tag=${selectedTag}, stock=${stock}, active=${active}, sort=${sort})}">
                    <i class="fas fa-chevron-right"></i>
                </a>
            </div>

            <div th:if="${totalItems == 0}" class="empty-state">
                <i class="fas fa-folder-open"></i>
                <p>Hiện tại chưa có sản phẩm nào trong hệ thống.</p>
            </div>
        </div>
    </div>
</div>

<div id="editProductModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3><i class="fas fa-edit"></i> Chỉnh sửa sản phẩm</h3>
            <button onclick="closeModal()" class="close-btn">&times;</button>
        </div>

        <form id="editProductForm">
            <div class="modal-body">
                <input type="hidden" id="editProductId">

                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label">Tên sản phẩm</label>
                        <input type="text" id="editName" class="form-control">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Trạng thái</label>
                        <select id="editActive" class="form-control">
                            <option value="true">Đang kinh doanh</option>
                            <option value="false">Ngừng kinh doanh</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Mô tả sản phẩm</label>
                    <textarea id="editDescription" class="form-control" rows="5" placeholder="Nhập mô tả sản phẩm..."></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">Danh mục</label>
                    <select id="editCategoryId" class="form-control">
                        <option th:each="cat : ${categories}"
                                th:value="${cat.categoryId}"
                                th:text="${cat.categoryName}"></option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Nhãn sản phẩm (Tags)</label>
                    <div class="tagify-modal-container">
                        <input id="modalTagifyInput" class="form-control" placeholder="Tìm kiếm hoặc thêm nhãn tag...">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Quản lý hình ảnh (Cloudinary)</label>
                    <div class="d-flex gap-2 mb-2">
                        <input type="file" id="modalFilePicker" style="display:none" multiple accept="image/*">
                        <button type="button" class="btn-filter" onclick="document.getElementById('modalFilePicker').click()">
                            <i class="fas fa-upload"></i> Thêm ảnh từ máy tính
                        </button>
                    </div>

                    <div id="imagePreviewContainer" class="d-flex flex-wrap gap-2 mb-2" style="border: 1px dashed #ccc; padding: 10px; min-height: 50px; border-radius: 8px;">
                        <span class="text-muted" style="font-size: 0.8rem;">Chưa có ảnh nào...</span>
                    </div>

                    <textarea id="editImages" class="form-control" rows="3" placeholder="Các URL ảnh sẽ hiện ở đây..."></textarea>
                </div>

                <div class="variant-edit-section">
                    <p class="form-label variant-section-label">Biến thể sản phẩm</p>
                    <div id="variantEditContainer"></div>
                </div>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn-cancel" onclick="closeModal()">Hủy bỏ</button>
                <button type="submit" class="btn-submit">Lưu thay đổi</button>
            </div>
        </form>
    </div>
</div>
<script th:inline="javascript">
    window.allTagsFromDb = /*[[${tags}]]*/ [];
</script>

<script th:src="@{/js/admin/product-manage.js}"></script>
<script th:src="@{/js/admin/admin-common.js}"></script>

</body>
</html>
