<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản trị Đơn hàng - Hệ thống Admin</title>
    <link rel="stylesheet" th:href="@{/css/admin/admin-common.css}">
    <link rel="stylesheet" th:href="@{/css/admin/order-manage.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div th:replace="~{fragments/admin-header :: div}"></div>

<div class="admin-main">

    <div class="filter-toolbar">
        <form th:action="@{/admin/orders}" method="get" class="filter-form">

            <div class="search-box">
                <input type="text" name="orderId" th:value="${orderId}" placeholder="Mã đơn hàng...">
            </div>

            <div class="search-box">
                <input type="text" name="customerName" th:value="${customerName}" placeholder="Tên khách hàng...">
            </div>

            <div class="search-box">
                <input type="text" name="phone" th:value="${phone}" placeholder="Số điện thoại...">
                <button type="submit"><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>

            <div class="select-group">
                <select name="status" onchange="this.form.submit()" class="fa-select">
                    <option value="" th:selected="${selectedStatus == null || selectedStatus == ''}" style="color: var(--text-main);">Tất cả trạng thái</option>
                    <option value="PENDING" th:selected="${selectedStatus == 'PENDING'}" style="color: #d97706;">&#xf017; Chờ duyệt</option>
                    <option value="PREPARING" th:selected="${selectedStatus == 'PREPARING'}" style="color: #0284c7;">&#xf466; Đang chuẩn bị</option>
                    <option value="SHIPPING" th:selected="${selectedStatus == 'SHIPPING'}" style="color: #9333ea;">&#xf0d1; Đang giao hàng</option>
                    <option value="SUCCESS" th:selected="${selectedStatus == 'SUCCESS'}" style="color: #059669;">&#xf058; Thành công</option>
                    <option value="FAILURE" th:selected="${selectedStatus == 'FAILURE'}" style="color: #dc2626;">&#xf057; Đã hủy</option>
                </select>
            </div>
        </form>
        <span class="total-count">Tìm thấy: <b th:text="${totalItems}">0</b> đơn hàng</span>
    </div>

    <div th:each="order : ${orders}" class="order-card" th:data-id="${order.orderId}">
        <div class="order-header">
            <div>
                <span class="order-id">#<span th:text="${order.orderId}"></span></span>
                <div class="order-date" th:text="${#dates.format(order.orderDate, 'HH:mm - dd/MM/yyyy')}"></div>
            </div>
            <div class="status-badge" th:classappend="'status-' + ${order.status}">
                <span th:switch="${order.status}">
                    <span th:case="'PENDING'"><i class="fa-regular fa-clock"></i> Chờ duyệt</span>
                    <span th:case="'PREPARING'"><i class="fa-solid fa-box"></i> Đang chuẩn bị</span>
                    <span th:case="'SHIPPING'"><i class="fa-solid fa-truck"></i> Đang giao</span>
                    <span th:case="'SUCCESS'"><i class="fa-solid fa-circle-check"></i> Thành công</span>
                    <span th:case="'FAILURE'"><i class="fa-solid fa-circle-xmark"></i> Đã hủy</span>
                </span>
            </div>
        </div>

        <div class="customer-bar">
            <div class="info-item"><i class="fa-solid fa-user"></i> <b th:text="${order.recipientName}"></b></div>
            <div class="info-item"><i class="fa-solid fa-phone"></i> <span th:text="${order.phone}"></span></div>
            <div class="info-item address-item"><i class="fa-solid fa-location-dot"></i> <span th:text="${order.fullAddress}"></span></div>
        </div>

        <div class="product-list">
            <div th:each="item, iter : ${order.items}" th:if="${iter.index < 2}" class="product-item">
                <img th:src="${item.imageUrl}" class="product-img">
                <span class="product-name" th:text="${item.productName} + ' (x' + ${item.quantity} + ')'"></span>
                <span class="product-price" th:text="${#numbers.formatDecimal(item.unitPrice, 0, 'COMMA', 0, 'POINT')} + 'đ'"></span>
            </div>
        </div>

        <div class="order-footer">
            <div class="total-amount-wrapper">
                <span class="label">Tổng tiền đơn hàng:</span>
                <div class="total-amount" th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + 'đ'"></div>
            </div>

            <div class="btn-group">
                <a th:href="@{/admin/orders/detail/{id}(id=${order.orderId})}" class="btn btn-info">
                    <i class="fa-solid fa-circle-info"></i> Chi tiết
                </a>

                <th:block th:if="${order.status == 'PENDING'}">
                    <button class="btn btn-success" th:onclick="'updateStatus(' + ${order.orderId} + ', \'PREPARING\')'">
                        <i class="fa-solid fa-box"></i> Duyệt đơn
                    </button>
                </th:block>

                <th:block th:if="${order.status == 'PREPARING'}">
                    <button class="btn btn-shipping" th:onclick="'updateStatus(' + ${order.orderId} + ', \'SHIPPING\')'">
                        <i class="fa-solid fa-truck"></i> Giao hàng
                    </button>
                </th:block>

                <th:block th:if="${order.status == 'SHIPPING'}">
                    <button class="btn btn-success" th:onclick="'updateStatus(' + ${order.orderId} + ', \'SUCCESS\')'">
                        <i class="fa-solid fa-square-check"></i> Hoàn thành
                    </button>
                </th:block>

                <th:block th:if="${order.status != 'SUCCESS' && order.status != 'FAILURE'}">
                    <button class="btn btn-cancel" th:onclick="'confirmCancel(' + ${order.orderId} + ')'">
                        <i class="fa-solid fa-trash-can"></i> Hủy đơn
                    </button>
                </th:block>
            </div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(orders)}" class="empty-orders">
        <i class="fa-solid fa-inbox"></i>
        <p>Không tìm thấy đơn hàng nào phù hợp với bộ lọc.</p>
    </div>

    <div class="pagination" th:if="${totalPages > 1}">
        <div class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
            <a class="page-link" th:href="@{/admin/orders(page=${currentPage - 1}, keyword=${keyword}, status=${selectedStatus})}">
                <i class="fa-solid fa-chevron-left"></i> Trước
            </a>
        </div>

        <div class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}" th:classappend="${currentPage == i} ? 'active'">
            <a class="page-link" th:href="@{/admin/orders(page=${i}, keyword=${keyword}, status=${selectedStatus})}" th:text="${i + 1}"></a>
        </div>

        <div class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
            <a class="page-link" th:href="@{/admin/orders(page=${currentPage + 1}, keyword=${keyword}, status=${selectedStatus})}">
                Sau <i class="fa-solid fa-chevron-right"></i>
            </a>
        </div>
    </div>
</div>

<script th:src="@{/js/admin/order-manage.js}"></script>

<script th:src="@{/js/admin/admin-common.js}"></script>
</body>
</html>
