<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Quản Lý Tin Tức</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/admin/admin-common.css}">
    <link rel="stylesheet" th:href="@{/css/admin/main.css}">
    <style>
        /* Toàn bộ phần CSS tối ưu giao diện Mobile và Desktop giữ nguyên như thiết kế trước đó */
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; gap: 15px; }
        .page-title { color: #1e293b; font-size: 1.5rem; font-weight: 700; margin: 0; }
        .data-table-container { display: block; padding: 0; overflow: hidden; background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .management-table { width: 100%; border-collapse: collapse; text-align: left; }
        .management-table thead { background: #f8fafc; border-bottom: 1px solid #e2e8f0; }
        .management-table th { padding: 16px 20px; color: #64748b; font-weight: 600; font-size: 0.85rem; text-transform: uppercase; }
        .management-table tbody tr { border-bottom: 1px solid #f1f5f9; transition: background 0.2s; }
        .management-table tbody tr:hover { background-color: #f8fafc; }
        .management-table td { padding: 16px 20px; color: #334155; vertical-align: middle; }
        .news-thumbnail { width: 100px; height: 60px; object-fit: cover; border-radius: 6px; border: 1px solid #e2e8f0; }
        .col-title { font-weight: 600; color: #1e293b; max-width: 250px; }
        .col-desc { color: #64748b; font-size: 0.9rem; max-width: 300px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .col-actions { text-align: center; white-space: nowrap; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s; font-size: 0.9rem; }
        .btn-primary { background: #4361ee; color: white; box-shadow: 0 4px 10px rgba(67, 97, 238, 0.2); }
        .btn-primary:hover { background: #304fd0; transform: translateY(-1px); }
        .btn-secondary { background: #f1f5f9; color: #475569; }
        .btn-edit { padding: 8px 12px; background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
        .btn-toggle { padding: 8px 12px; background: #f8fafc; color: #475569; border: 1px solid #e2e8f0; }
        .btn-toggle-on { background: #f1f5f9; color: #94a3b8; }
        .btn-delete { padding: 8px 12px; background: #fef2f2; color: #991b1b; border: 1px solid #fee2e2; }
        .badge { padding: 6px 12px; border-radius: 9999px; font-size: 0.8rem; font-weight: 600; }
        .badge-success { background: #dcfce7; color: #166534; }
        .badge-danger { background: #fee2e2; color: #991b1b; }
        .custom-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); z-index: 9999; justify-content: center; align-items: center; padding: 16px; box-sizing: border-box; }
        .modal-content { background: white; padding: 30px; border-radius: 16px; width: 650px; max-width: 100%; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); max-height: 90vh; overflow-y: auto; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 600; color: #344054; font-size: 0.9rem; }
        .form-control { width: 100%; padding: 10px 14px; border: 1px solid #d0d5dd; border-radius: 8px; box-sizing: border-box; font-size: 0.95rem; }
        .form-control:focus { outline: none; border-color: #4361ee; box-shadow: 0 0 0 4px rgba(67, 97, 238, 0.12); }
        .btn-group { display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px; }
        .img-current-edit { width: 100%; height: 160px; object-fit: cover; border-radius: 8px; margin-top: 5px; border: 1px dashed #cbd5e1; }
        .preview-box { display: none; background: #f8fafc; padding: 12px; border-radius: 8px; border: 1px dashed #cbd5e1; margin-top: 12px; }
        .checkbox-group { display: flex; align-items: center; gap: 10px; margin-top: 12px; }
        .checkbox-control { width: 18px; height: 18px; border-radius: 4px; border: 1px solid #d0d5dd; cursor: pointer; }
        .checkbox-label { margin: 0; cursor: pointer; font-weight: 500; color: #344054; font-size: 0.9rem; }

        @media screen and (max-width: 768px) {
            .main-content { margin-left: 0 !important; padding: 16px !important; width: 100% !important; box-sizing: border-box; }
            .sidebar { display: none !important; }
            .page-header { flex-direction: column; align-items: stretch; margin-bottom: 20px; gap: 12px; }
            .page-title { font-size: 1.35rem; text-align: center; }
            .btn-primary { width: 100%; padding: 12px; }
            .data-table-container { background: transparent; box-shadow: none; }
            .management-table, .management-table thead, .management-table tbody, .management-table th, .management-table td, .management-table tr { display: block; }
            .management-table thead { display: none; }
            .management-table tbody tr { background: white; border-radius: 16px; padding: 18px; margin-bottom: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
            .management-table td { padding: 10px 0; border-bottom: 1px dashed #f1f5f9; display: flex; align-items: center; justify-content: space-between; font-size: 0.9rem; }
            .management-table td:last-of-type { border-bottom: none; }
            .management-table td::before { content: attr(data-label); font-weight: 600; color: #64748b; font-size: 0.85rem; }
            .management-table td[data-label="Ảnh bìa"] { flex-direction: column; align-items: stretch; gap: 8px; }
            .management-table td[data-label="Ảnh bìa"]::before { align-self: flex-start; }
            .news-thumbnail { width: 100%; height: 150px; border-radius: 10px; }
            .col-title, .col-desc { max-width: 60%; text-align: right; }
            .col-actions { justify-content: flex-end !important; gap: 10px; padding-top: 14px !important; }
            .btn-edit, .btn-toggle, .btn-delete { flex: 1; padding: 11px; font-size: 0.95rem; border-radius: 8px; }
            .btn-group { flex-direction: column; gap: 10px; }
            .btn-group .btn { width: 100%; }
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/admin-header :: div}"></div>

<div class="main-content">
    <div class="page-header">
        <h2 class="page-title">Quản Lý Tin Tức & Bài Viết</h2>
        <button class="btn btn-primary" onclick="openAddModal()"><i class="fas fa-plus"></i> Viết Bài Mới</button>
    </div>

    <div class="stat-card data-table-container">
        <table class="management-table">
            <thead>
            <tr>
                <th>STT</th>
                <th>Ảnh bìa</th>
                <th>Tiêu đề bài viết</th>
                <th>Mô tả ngắn</th>
                <th>Trạng thái</th>
                <th class="col-actions">Hành động</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="news, iter : ${newsList}">
                <td data-label="STT" th:text="${iter.index + 1}">1</td>
                <td data-label="Ảnh bìa">
                    <img th:src="${news.thumbnail}" class="news-thumbnail" alt="Thumbnail">
                </td>
                <td data-label="Tiêu đề bài viết" class="col-title" th:text="${news.title}">Tiêu đề mẫu</td>
                <td data-label="Mô tả ngắn" class="col-desc" th:text="${news.shortDescription}">Tóm tắt nội dung...</td>
                <td data-label="Trạng thái">
                    <span th:if="${news.active}" class="badge badge-success">Công khai</span>
                    <span th:unless="${news.active}" class="badge badge-danger">Bản nháp</span>
                </td>
                <td data-label="Hành động" class="col-actions">
                    <button type="button" class="btn btn-edit"
                            th:data-id="${news.id}"
                            th:data-title="${news.title}"
                            th:data-desc="${news.shortDescription}"
                            th:data-content="${news.content}"
                            th:data-thumbnail="${news.thumbnail}"
                            th:data-active="${news.active}"
                            onclick="openEditModal(this)">
                        <i class="fas fa-edit"></i>
                    </button>
                    <button type="button"
                            th:class="${news.active} ? 'btn btn-toggle btn-toggle-on' : 'btn btn-primary btn-toggle'"
                            th:onclick="'toggleNewsStatus(' + ${news.id} + ')'">
                        <i th:class="${news.active} ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
                    </button>
                    <button type="button" class="btn btn-delete"
                            th:onclick="'deleteNews(' + ${news.id} + ')'">
                        <i class="fas fa-trash"></i>
                    </button>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(newsList)}">
                <td colspan="6" class="empty-row">Chưa có bài viết tin tức nào.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<div id="addNewsModal" class="custom-modal">
    <div class="modal-content">
        <h3 class="modal-title">Viết Bài Tin Tức Mới</h3>
        <form id="addForm" th:action="@{/admin/news/save}" method="POST" th:object="${newsRequest}">
            <input type="hidden" id="addUploadedUrl" th:field="*{thumbnail}" required>

            <div class="form-group">
                <label>Tiêu đề bài viết</label>
                <input type="text" th:field="*{title}" class="form-control" placeholder="Nhập tiêu đề..." required>
            </div>
            <div class="form-group">
                <label>Mô tả ngắn</label>
                <textarea th:field="*{shortDescription}" class="form-control" rows="2" placeholder="Tóm tắt bài viết..." required></textarea>
            </div>
            <div class="form-group">
                <label>Nội dung chi tiết bài viết</label>
                <textarea th:field="*{content}" class="form-control" rows="5" placeholder="Nội dung bài viết..." required></textarea>
            </div>
            <div class="form-group">
                <label>Chọn ảnh đại diện bài viết</label>
                <input type="file" class="form-control" accept="image/*" required onchange="uploadAndPreview(this, 'addPreview', 'addPreviewBox', 'addUploadedUrl', 'addSubmitBtn', 'addStatus')">
            </div>
            <div class="form-group preview-box" id="addPreviewBox">
                <span class="status-text" id="addStatus" style="color: #2563eb;"></span>
                <img id="addPreview" src="" class="img-current-edit" alt="Add Preview">
            </div>
            <div class="btn-group">
                <button type="button" class="btn btn-secondary" onclick="closeModal('addNewsModal')">Hủy</button>
                <button type="submit" id="addSubmitBtn" class="btn btn-primary">Đăng Bài Viết</button>
            </div>
        </form>
    </div>
</div>

<div id="editNewsModal" class="custom-modal">
    <div class="modal-content">
        <h3 class="modal-title">Chỉnh Sửa Bài Viết</h3>
        <form id="editForm" method="POST">
            <input type="hidden" id="editUploadedUrl" name="thumbnail">

            <div class="form-group">
                <label>Tiêu đề bài viết</label>
                <input type="text" id="editTitle" name="title" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Mô tả ngắn</label>
                <textarea id="editDesc" name="shortDescription" class="form-control" rows="2" required></textarea>
            </div>
            <div class="form-group">
                <label>Nội dung chi tiết bài viết</label>
                <textarea id="editContent" name="content" class="form-control" rows="5" required></textarea>
            </div>
            <div class="form-group">
                <label>Ảnh bìa hiện tại</label>
                <img id="editPreview" src="" class="img-current-edit" alt="Current Preview">
            </div>
            <div class="form-group">
                <label>Thay đổi ảnh bìa mới</label>
                <input type="file" id="editFileForm" class="form-control" accept="image/*" onchange="uploadAndPreview(this, 'editNewPreview', 'editPreviewBox', 'editUploadedUrl', 'editSubmitBtn', 'editStatus')">
            </div>
            <div class="form-group preview-box" id="editPreviewBox">
                <span class="status-text" id="editStatus" style="color: #10b981;"></span>
                <img id="editNewPreview" src="" class="img-current-edit" alt="New Preview">
            </div>
            <div class="form-group checkbox-group">
                <input type="checkbox" id="editActive" name="active" value="true" class="checkbox-control">
                <label for="editActive" class="checkbox-label">Công khai bài viết ngay</label>
            </div>
            <div class="btn-group">
                <button type="button" class="btn btn-secondary" onclick="closeModal('editNewsModal')">Hủy</button>
                <button type="submit" id="editSubmitBtn" class="btn btn-primary">Cập Nhật</button>
            </div>
        </form>
    </div>
</div>

<script th:src="@{/js/admin/admin-common.js}"></script>
<script>

    /**
     * File: news-manage.js
     * Quản lý tương tác REST API và điều khiển UI các Modal Tin tức bài viết
     */

    document.addEventListener("DOMContentLoaded", function () {
        // Đón đầu sự kiện Submit Form Thêm Mới
        const addForm = document.getElementById('addForm');
        if (addForm) {
            addForm.addEventListener('submit', function (e) {
                e.preventDefault();
                const formData = new FormData(this);

                fetch(this.action, {
                    method: 'POST',
                    body: formData
                })
                    .then(response => response.json())
                    .then(data => {
                        alert(data.message);
                        if (data.success) {
                            window.location.reload();
                        }
                    })
                    .catch(error => {
                        console.error("Error saving news:", error);
                        alert("Lỗi: Không thể kết nối máy chủ để đăng bài viết!");
                    });
            });
        }

        // Đón đầu sự kiện Submit Form Chỉnh Sửa
        const editForm = document.getElementById('editForm');
        if (editForm) {
            editForm.addEventListener('submit', function (e) {
                e.preventDefault();
                const formData = new FormData(this);

                fetch(this.action, {
                    method: 'POST',
                    body: formData
                })
                    .then(response => response.json())
                    .then(data => {
                        alert(data.message);
                        if (data.success) {
                            window.location.reload();
                        }
                    })
                    .catch(error => {
                        console.error("Error updating news:", error);
                        alert("Lỗi: Không thể kết nối máy chủ để cập nhật bài viết!");
                    });
            });
        }
    });

    // Hàm Ajax: Tự động tải ảnh lên Cloudinary thu về URL dạng mảng chuỗi ngầm
    function uploadAndPreview(input, previewImgId, previewBoxId, hiddenInputId, submitBtnId, statusId) {
        const file = input.files[0];
        if (!file) return;

        const previewBox = document.getElementById(previewBoxId);
        const previewImg = document.getElementById(previewImgId);
        const submitBtn = document.getElementById(submitBtnId);
        const statusLabel = document.getElementById(statusId);

        previewBox.style.display = 'block';
        previewImg.style.opacity = '0.4';
        statusLabel.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang tải tập tin ảnh...';

        const reader = new FileReader();
        reader.onload = function(e) { previewImg.src = e.target.result; };
        reader.readAsDataURL(file);

        submitBtn.disabled = true;
        submitBtn.style.opacity = '0.5';

        const formData = new FormData();
        formData.append("files", file);

        fetch('/admin/news/upload', {
            method: 'POST',
            body: formData
        })
            .then(response => {
                if (!response.ok) throw new Error("Lỗi tải lên");
                return response.json();
            })
            .then(urls => {
                if (urls && urls.length > 0) {
                    const cloudUrl = urls[0];
                    document.getElementById(hiddenInputId).value = cloudUrl;

                    previewImg.src = cloudUrl;
                    previewImg.style.opacity = '1';
                    statusLabel.innerHTML = '<i class="fas fa-check-circle"></i> Tải ảnh thành công!';
                    statusLabel.style.color = '#10b981';

                    submitBtn.disabled = false;
                    submitBtn.style.opacity = '1';
                }
            })
            .catch(error => {
                console.error("Upload error: ", error);
                statusLabel.innerHTML = '<i class="fas fa-times-circle"></i> Tải ảnh thất bại!';
                statusLabel.style.color = '#ef4444';
                previewImg.style.opacity = '1';
                alert('Gặp trục trặc khi tải ảnh đại diện bài viết!');
            });
    }

    // Bật tắt ẩn hiển bài viết thông qua API
    function toggleNewsStatus(newsId) {
        fetch(`/admin/news/toggle/${newsId}`, {
            method: 'POST'
        })
            .then(response => response.json())
            .then(data => {
                alert(data.message);
                if (data.success) {
                    window.location.reload();
                }
            })
            .catch(error => {
                console.error("Toggle status error:", error);
                alert("Gặp lỗi đường truyền khi đổi trạng thái hiển thị!");
            });
    }

    // Gửi tín hiệu xóa bài viết qua phương thức DELETE ngầm
    function deleteNews(newsId) {
        if (!confirm('Bạn có chắc chắn muốn xóa bài viết tin tức này?')) return;

        fetch(`/admin/news/delete/${newsId}`, {
            method: 'DELETE'
        })
            .then(response => response.json())
            .then(data => {
                alert(data.message);
                if (data.success) {
                    window.location.reload();
                }
            })
            .catch(error => {
                console.error("Delete news error:", error);
                alert("Gặp lỗi kết nối khi cố gắng xóa bài viết!");
            });
    }

    function openAddModal() {
        document.getElementById('addForm').reset();
        document.getElementById('addUploadedUrl').value = '';
        document.getElementById('addPreviewBox').style.display = 'none';
        document.getElementById('addPreview').src = '';

        const submitBtn = document.getElementById('addSubmitBtn');
        submitBtn.disabled = false;
        submitBtn.style.opacity = '1';

        document.getElementById('addNewsModal').style.display = 'flex';
    }

    function openEditModal(button) {
        const id = button.getAttribute('data-id');
        if (!id || id === 'null') {
            alert('Lỗi: Không định dạng được ID bài viết!');
            return;
        }

        const title = button.getAttribute('data-title');
        const desc = button.getAttribute('data-desc');
        const content = button.getAttribute('data-content');
        const thumbnail = button.getAttribute('data-thumbnail');
        const active = button.getAttribute('data-active') === 'true';

        document.getElementById('editFileForm').value = '';
        document.getElementById('editPreviewBox').style.display = 'none';
        document.getElementById('editNewPreview').src = '';

        const submitBtn = document.getElementById('editSubmitBtn');
        submitBtn.disabled = false;
        submitBtn.style.opacity = '1';

        // Đẩy thông tin cũ lên form chỉnh sửa bài viết
        document.getElementById('editForm').action = '/admin/news/edit/' + id;
        document.getElementById('editTitle').value = title;
        document.getElementById('editDesc').value = desc;
        document.getElementById('editContent').value = content;
        document.getElementById('editPreview').src = thumbnail;
        document.getElementById('editUploadedUrl').value = thumbnail;
        document.getElementById('editActive').checked = active;

        document.getElementById('editNewsModal').style.display = 'flex';
    }

    function closeModal(modalId) {
        document.getElementById(modalId).style.display = 'none';
    }

    window.onclick = function(event) {
        if (event.target.classList.contains('custom-modal')) {
            event.target.style.display = 'none';
        }
    }
</script>
</body>
</html>
