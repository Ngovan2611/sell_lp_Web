<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm sản phẩm mới | SellLP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/admin/product-form.css}">
    <link rel="icon" href="data:,">

    <link href="https://cdn.jsdelivr.net/npm/@yaireo/tagify/dist/tagify.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@yaireo/tagify"></script>

    <style>
        /* Tùy biến giao diện ô nhập Tagify đồng bộ với form hệ thống */
        .tagify-container {
            margin-top: 5px;
        }
        .tagify {
            width: 100%;
            max-width: 100%;
            padding: 4px 8px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            background: #fff;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }
        .tagify:hover {
            border-color: #94a3b8;
        }
        .tagify--focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 1px #3b82f6;
        }
        /* Thay đổi màu sắc tag được chọn sang tone màu sáng sủa */
        .tagify__tag {
            background-color: #e0f2fe;
            color: #0369a1;
            border-radius: 4px;
            font-weight: 500;
        }
        .tagify__tag__removeBtn {
            color: #0369a1;
        }
        .tagify__tag__removeBtn:hover {
            background: #bae6fd;
            color: #b91c1c;
        }
        /* Đè chiều cao dropdown gợi ý để không bị che */
        .tags-look .tagify__dropdown__wrapper{
            border: 1px solid #cbd5e1;
            background: #fff;
            border-radius: 6px;
        }
        .hidden-tags-inputs {
            display: none;
        }
        /* Style bổ trợ ẩn cột mượt mà */
        .d-none {
            display: none !important;
        }
    </style>
</head>
<body>

<div class="admin-product-manager">
    <h2><i class="fas fa-plus-circle"></i> Thêm sản phẩm mới</h2>

    <form th:action="@{/admin/products/add}" th:object="${productRequest}" method="post" onsubmit="return validateVariants()">
        <div class="form-grid">
            <div class="form-group">
                <label class="form-label">Tên sản phẩm</label>
                <input type="text" th:field="*{name}" class="form-input" placeholder="Tên sản phẩm..." required>
            </div>
            <div class="form-group">
                <label class="form-label">Mô tả</label>
                <input type="text" th:field="*{description}" class="form-input" placeholder="Mô tả sản phẩm..." required>
            </div>
            <div class="form-group">
                <label class="form-label">Danh mục</label>
                <select th:field="*{categoryId}" class="form-input" id="categoryId">
                    <option th:each="c : ${categories}"
                            th:value="${c.categoryId}"
                            th:text="${c.categoryName}"
                            th:attr="data-has-specs=${c.hasSpecs}">
                    </option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label"><i class="fas fa-tags"></i> Gắn nhãn sản phẩm (Tags)</label>
            <div class="tagify-container">
                <input id="tagifyInput" class="form-input" placeholder="Nhấp chọn hoặc gõ tìm kiếm nhãn tag...">

                <div id="hiddenTagsContainer" class="hidden-tags-inputs"></div>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Hình ảnh chính của sản phẩm</label>

            <div id="singlePreview" class="img-preview-box d-none">
                <img id="previewImg" src="" alt="Preview">
                <p class="img-preview-success"><i class="fas fa-check-circle"></i> Đã chọn làm ảnh chính</p>
            </div>

            <div class="upload-btn-wrapper">
                <label for="filePicker" class="custom-upload-btn">
                    <i class="fas fa-cloud-upload-alt"></i> Chọn hình ảnh sản phẩm...
                </label>
                <input type="file" id="filePicker" accept="image/*">
            </div>

            <input type="hidden" th:field="*{imageUrl}" id="finalImageUrl">
            <div id="uploadStatus" class="upload-status-text"></div>
        </div>

        <div class="variant-section">
            <h3><i class="fas fa-th-list"></i> Cấu hình các biến thể</h3>
            <table class="variant-table">
                <thead>
                <tr>
                    <th>Màu sắc</th>
                    <th class="spec-column">RAM</th>
                    <th class="spec-column">ROM</th>
                    <th>Giá bán (đ)</th>
                    <th>Kho</th>
                    <th>Thao tác</th>
                </tr>
                </thead>
                <tbody id="variant-items">
                </tbody>
            </table>

            <button type="button" class="btn-add-variant" onclick="addVariant()">
                <i class="fas fa-plus"></i> Thêm biến thể mới
            </button>
        </div>

        <div class="form-actions-container">
            <button type="submit" class="btn-submit">Hoàn tất & Lưu</button>
        </div>
    </form>
</div>

<script th:inline="javascript">
    window.productColors = /*[[${colors}]]*/ [];
    window.productRams = /*[[${rams}]]*/ [];
    window.productRoms = /*[[${roms}]]*/ [];
    window.allTagsFromDb = /*[[${tags}]]*/ [];
</script>

<script th:src="@{/js/admin/product-add-form.js}"></script>
</body>
</html>
