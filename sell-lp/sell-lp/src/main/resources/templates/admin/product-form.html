<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm sản phẩm mới | SellLP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/admin/product-form.css}">
    <link rel="icon" href="data:,">
</head>
<body>

<div class="admin-product-manager">
    <h2><i class="fas fa-plus-circle"></i> Thêm sản phẩm mới</h2>

    <form th:action="@{/admin/products/add}" th:object="${productRequest}" method="post">
        <div class="form-grid">
            <div class="form-group">
                <label class="form-label">Tên sản phẩm</label>
                <input type="text" th:field="*{name}" class="form-input" placeholder="Tên sản phẩm..." required>
            </div>
            <div class="form-group">
                <label class="form-label">Mô tả</label>
                <input type="text" th:field="*{description}" class="form-input" placeholder="Mô tả sản phẩm..." required>
            </div>
            <div class="form-group">
                <label class="form-label">Danh mục</label>
                <select th:field="*{categoryId}" class="form-input" id="categoryId">
                    <option th:each="c : ${categories}"
                            th:value="${c.categoryId}"
                            th:text="${c.categoryName}"
                            th:attr="data-has-specs=${c.hasSpecs}">
                    </option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Hình ảnh chính của sản phẩm</label>

            <div id="singlePreview" class="img-preview-box d-none">
                <img id="previewImg" src="" alt="Preview">
                <p class="img-preview-success"><i class="fas fa-check-circle"></i> Đã chọn làm ảnh chính</p>
            </div>

            <div class="upload-btn-wrapper">
                <label for="filePicker" class="custom-upload-btn">
                    <i class="fas fa-cloud-upload-alt"></i> Chọn hình ảnh sản phẩm...
                </label>
                <input type="file" id="filePicker" accept="image/*">
            </div>

            <input type="hidden" th:field="*{imageUrl}" id="finalImageUrl">
            <div id="uploadStatus" class="upload-status-text"></div>
        </div>

        <div class="variant-section">
            <h3><i class="fas fa-th-list"></i> Cấu hình các biến thể</h3>
            <table class="variant-table">
                <thead>
                <tr>
                    <th>Màu sắc</th>
                    <th class="spec-column">RAM</th>
                    <th class="spec-column">ROM</th>
                    <th>Giá bán (đ)</th>
                    <th>Kho</th>
                    <th></th>
                </tr>
                </thead>
                <tbody id="variant-items">
                </tbody>
            </table>

            <button type="button" class="btn-add-variant" onclick="addVariant()">
                <i class="fas fa-plus"></i> Thêm biến thể mới
            </button>
        </div>

        <div class="form-actions-container">
            <button type="submit" class="btn-submit">Hoàn tất & Lưu</button>
        </div>
    </form>
</div>

<script th:inline="javascript">
    let variantIdx = 0;
    const colors = [[${colors}]];
    const rams = [[${rams}]];
    const roms = [[${roms}]];

    function addVariant() {
        const categorySelect = document.getElementById('categoryId');

        // 1. Lấy ra thẻ <option> đang được chọn hiện tại
        const selectedOption = categorySelect.options[categorySelect.selectedIndex];

        // 2. Đọc thuộc tính data-has-specs từ option đó (trả về chuỗi 'true' hoặc 'false')
        // Ép kiểu về Boolean để kiểm tra dữ liệu chuẩn xác
        const isTechProduct = selectedOption.dataset.hasSpecs === 'true';

        // 3. Sử dụng class 'd-none' dựa trên tính chất động của danh mục
        const displayClass = isTechProduct ? '' : 'd-none';

        const tbody = document.getElementById('variant-items');
        const row = document.createElement('tr');

        row.innerHTML = `
        <td>
            <select name="variants[${variantIdx}].colorId" class="form-input">
                ${colors.map(c => `<option value="${c.colorId}">${c.colorName}</option>`).join('')}
            </select>
        </td>
        <td class="spec-column ${displayClass}">
            <select name="variants[${variantIdx}].ramId" class="form-input">
                <option value="">N/A</option>
                ${rams.map(r => `<option value="${r.ramId}">${r.ramSize}</option>`).join('')}
            </select>
        </td>
        <td class="spec-column ${displayClass}">
            <select name="variants[${variantIdx}].romId" class="form-input">
                <option value="">N/A</option>
                ${roms.map(r => `<option value="${r.romId}">${r.romSize}</option>`).join('')}
            </select>
        </td>
        <td><input type="number" name="variants[${variantIdx}].price" min="0" class="form-input" placeholder="Giá" required></td>
        <td><input type="number" name="variants[${variantIdx}].stockQty" min="0" class="form-input" placeholder="Kho" required></td>
        <td>
            <button type="button" class="btn-remove" onclick="this.closest('tr').remove()">
                <i class="fas fa-trash"></i>
            </button>
        </td>
    `;
        tbody.appendChild(row);

        // 4. Đồng bộ ẩn/hiện các cột tiêu đề (Thẻ TH) trên Header của bảng biến thể
        const headerSpecs = document.querySelectorAll('thead .spec-column');
        headerSpecs.forEach(col => {
            if (isTechProduct) {
                col.classList.remove('d-none');
            } else {
                col.classList.add('d-none');
            }
        });

        variantIdx++;
    }
    // Lắng nghe sự kiện đổi danh mục để reset bảng
    document.getElementById('categoryId').addEventListener('change', function() {
        const tbody = document.getElementById('variant-items');
        tbody.innerHTML = '';
        variantIdx = 0;
        addVariant();
    });

    // Lắng nghe xử lý tải hình ảnh lên Cloud/Server ẩn
    document.getElementById('filePicker').addEventListener('change', async function(e) {
        const files = e.target.files;
        if (files.length === 0) return;

        const status = document.getElementById('uploadStatus');
        const previewDiv = document.getElementById('singlePreview');
        const previewImg = document.getElementById('previewImg');
        const finalInput = document.getElementById('finalImageUrl');

        status.innerText = "Đang xử lý ảnh...";
        status.style.color = "#666";

        const formData = new FormData();
        formData.append('files', files[0]);

        try {
            const res = await fetch('/admin/products/upload', {
                method: 'POST',
                body: formData
            });

            if (res.ok) {
                const urls = await res.json();
                const uploadedUrl = urls[0];

                finalInput.value = uploadedUrl;
                previewImg.src = uploadedUrl;

                // Hiển thị khung xem trước bằng cách gỡ bỏ class 'd-none'
                previewDiv.classList.remove('d-none');

                status.innerText = "Tải ảnh thành công!";
                status.style.color = "green";
            } else {
                status.innerText = "Lỗi khi tải ảnh lên server!";
                status.style.color = "red";
            }
        } catch (error) {
            console.error("Error:", error);
            status.innerText = "Lỗi kết nối server!";
            status.style.color = "red";
        }
    });
    // Thêm dòng này ở cuối cùng của thẻ script (nằm ngoài các hàm) để chạy ngay khi load trang
    document.addEventListener("DOMContentLoaded", function() {
        // Tự động thêm một biến thể đầu tiên khớp với danh mục đang chọn mặc định
        addVariant();
    });
</script>
</body>
</html>
