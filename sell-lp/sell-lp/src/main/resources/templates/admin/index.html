<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/admin/admin-common.css}">
    <link rel="stylesheet" th:href="@{/css/admin/main.css}">
</head>
<body>

<div th:replace="~{fragments/admin-header :: div}"></div>

<div class="main-content">
    <div class="header-stats">
        <div class="stat-card">
            <i class="fas fa-dollar-sign stat-icon"></i>
            <div class="stat-info">
                <h3>Doanh thu</h3>
                <p th:text="${#numbers.formatDecimal(totalRevenue, 0, 'COMMA', 0, 'POINT')} + ' VND'"></p>
            </div>
        </div>
        <a th:href="@{/admin/users}" style="text-decoration: none; cursor: pointer">
            <div class="stat-card">
                <i class="fas fa-users stat-icon" style="color: #2ecc71;"></i>
                <div class="stat-info">
                    <h3>Khách hàng</h3>
                    <p th:text="${totalCustomers}"></p>
                </div>
            </div>
        </a>

        <a th:href="@{/admin/orders}" style="text-decoration: none; cursor: pointer">
            <div class="stat-card">
                <i class="fas fa-shopping-bag stat-icon" style="color: #e67e22;"></i>
                <div class="stat-info">
                    <h3>Đơn mới</h3>
                    <p th:text="${newOrders}"></p>
                </div>
            </div>
        </a>

    </div>
    <div class="charts-container" style="margin-top: 30px; display: grid; grid-template-columns: 2fr 1fr; gap: 20px;">
        <div class="stat-card" style="display: block;">
            <h3 style="margin-bottom: 20px; color: #7f8c8d;">Xu hướng doanh thu</h3>
            <div class="chart-container-wrapper">
                <canvas id="revenueChart"></canvas>
            </div>
        </div>

        <div class="stat-card" style="display: block;">
            <h3 style="margin-bottom: 20px; color: #7f8c8d;">Trạng thái đơn hàng</h3>
            <canvas id="statusChart"></canvas>
        </div>
    </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script th:inline="javascript">
    window.dashboardRevenueData = /*[[${revenueData}]]*/ [];
    window.dashboardDayLabels = /*[[${dayLabels}]]*/ [];
    window.dashboardStatusData = /*[[${statusData}]]*/ [];
</script>

<script th:src="@{/js/admin/main.js}"></script>
<script th:src="@{/js/admin/admin-common.js}"></script>

</body>
</html>
