<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/admin/admin-common.css}">
    <link rel="stylesheet" th:href="@{/css/admin/main.css}">
</head>
<body>

<div th:replace="~{fragments/admin-header :: div}"></div>

<div class="main-content">
    <div class="header-stats">
        <div class="stat-card">
            <i class="fas fa-dollar-sign stat-icon"></i>
            <div class="stat-info">
                <h3>Doanh thu</h3>
                <p th:text="${#numbers.formatDecimal(totalRevenue, 0, 'COMMA', 0, 'POINT')} + ' VND'"></p>
            </div>
        </div>

        <div class="stat-card">
            <i class="fas fa-users stat-icon" style="color: #2ecc71;"></i>
            <div class="stat-info">
                <h3>Khách hàng</h3>
                <p th:text="${totalCustomers}"></p>
            </div>
        </div>

        <div class="stat-card">
            <i class="fas fa-shopping-bag stat-icon" style="color: #e67e22;"></i>
            <div class="stat-info">
                <h3>Đơn mới</h3>
                <p th:text="${newOrders}"></p>
            </div>
        </div>
    </div>
    <div class="charts-container" style="margin-top: 30px; display: grid; grid-template-columns: 2fr 1fr; gap: 20px;">
        <div class="stat-card" style="display: block;">
            <h3 style="margin-bottom: 20px; color: #7f8c8d;">Xu hướng doanh thu</h3>
            <div class="chart-container-wrapper">
                <canvas id="revenueChart"></canvas>
            </div>
        </div>

        <div class="stat-card" style="display: block;">
            <h3 style="margin-bottom: 20px; color: #7f8c8d;">Trạng thái đơn hàng</h3>
            <canvas id="statusChart"></canvas>
        </div>
    </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script th:inline="javascript">
    const revenueData = [[${revenueData}]];
    const dayLabels = [[${dayLabels}]];
    const statusData = [[${statusData}]];

    const ctxRevenue = document.getElementById('revenueChart').getContext('2d');
    new Chart(ctxRevenue, {
        type: 'line',
        data: {
            labels: dayLabels,
            datasets: [{
                label: 'Doanh thu',
                data: revenueData,
                borderColor: '#4361ee',
                backgroundColor: 'rgba(67, 97, 238, 0.1)',
                fill: true,
                tension: 0.4,
                pointRadius: 6,
                pointBackgroundColor: '#4361ee'
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            layout: {
                padding: { top: 20 }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    max: 180000000,
                    ticks: {
                        stepSize: 2000000,
                        callback: function(value) {
                            const milestones = [10000000, 50000000, 100000000];
                            if (milestones.includes(value)) return (value / 1000000) + ' Tr';
                            if (value === 0) return '0';
                            return null;
                        }
                    },
                    grid: {
                        drawBorder: false,
                        color: function(context) {
                            const val = context.tick.value;
                            if ([10000000, 50000000, 100000000].includes(val)) return 'rgba(0, 0, 0, 0.1)';
                            return 'transparent';
                        }
                    }
                },
                x: {
                    grid: { display: false },
                    ticks: { color: '#94a3b8' }
                }
            },
            plugins: {
                legend: { display: false },
                tooltip: {
                    enabled: true,
                    callbacks: {
                        label: function(context) {
                            return ' ' + context.parsed.y.toLocaleString('vi-VN') + ' VND';
                        }
                    }
                }
            }
        }
    });
    const ctxStatus = document.getElementById('statusChart').getContext('2d');
    new Chart(ctxStatus, {
        type: 'doughnut',
        data: {
            labels: ['Thành công', 'Chờ xử lý', 'Đã hủy'],
            datasets: [{
                data: statusData,
                backgroundColor: ['#2ecc71', '#ff9f1c', '#e71d36']
            }]
        },
        options: {
            cutout: '70%',
            plugins: {
                legend: { position: 'bottom' }
            }
        }
    });
</script>
</body>
</html>
