<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh toán thành công</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes checkmark {
            0% { stroke-dashoffset: 100; }
            100% { stroke-dashoffset: 0; }
        }
        .animate-check {
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            animation: checkmark 0.8s ease-in-out forwards 0.2s;
        }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full text-center">
    <div class="flex justify-center mb-6">
        <svg class="w-20 h-20 text-green-500" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
            <circle class="opacity-20" cx="12" cy="12" r="10"></circle>
            <path class="animate-check" stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path>
        </svg>
    </div>

    <h1 class="text-2xl font-bold text-gray-800 mb-2">Thanh toán thành công!</h1>
    <p class="text-gray-600 mb-8" th:text="${message}">Cảm ơn bạn đã tin tưởng mua hàng tại Sell-LP.</p>

    <div class="bg-gray-50 rounded-lg p-4 text-left mb-8 space-y-3">
        <div class="flex justify-between border-bottom pb-2">
            <span class="text-gray-500 text-sm font-medium uppercase">Mã đơn hàng:</span>
            <span class="text-gray-800 font-bold" th:text="${orderId}">#03731806</span>
        </div>
        <div class="flex justify-between">
            <span class="text-gray-500 text-sm font-medium uppercase">Số tiền:</span>
            <span class="text-green-600 font-bold" th:text="${#numbers.formatDecimal(totalPrice, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'">20.030.000 VNĐ</span>
        </div>
        <div class="flex justify-between">
            <span class="text-gray-500 text-sm font-medium uppercase">Ngân hàng:</span>
            <span class="text-gray-800 font-medium" th:text="${bankCode}">NCB</span>
        </div>
    </div>

    <div class="space-y-3">
        <a href="/history-order" class="block w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition duration-200">
            Xem lịch sử đơn hàng
        </a>
        <a href="/home" class="block w-full bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold py-3 rounded-lg transition duration-200">
            Tiếp tục mua sắm
        </a>
    </div>

    <p class="mt-6 text-xs text-gray-400 italic">
        Hệ thống sẽ tự động chuyển hướng sau <span id="countdown">10</span> giây...
    </p>
</div>

<script>
    let seconds = 10;
    const countdownEl = document.getElementById('countdown');
    setInterval(() => {
        seconds--;
        if (seconds >= 0) countdownEl.innerText = seconds;
        if (seconds === 0) window.location.href = '/history-order';
    }, 1000);
</script>
</body>
</html>
