<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Chi tiết sản phẩm</title>
    <link rel="stylesheet" th:href="@{/css/user/common.css}">
    <link rel="stylesheet" th:href="@{/css/user/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/user/products.css}">
    <link rel="stylesheet" th:href="@{/css/user/product-detail.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        /* CSS hỗ trợ hiển thị danh sách Tag đính kèm */
        .product-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 10px 0 15px 0;
        }
        .tag-item-link {
            text-decoration: none;
        }
        .tag-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background-color: #f1f5f9;
            color: #475569;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            transition: all 0.2s ease;
        }
        .tag-badge:hover {
            background-color: #3b82f6;
            color: #ffffff;
            border-color: #3b82f6;
        }
        .tag-badge i {
            font-size: 0.7rem;
        }
    </style>
</head>

<body>
<div th:replace="~{fragments/header :: header}"></div>
<div class="breadcrumb">
    <a th:href="@{/home}">Trang chủ</a>  >
    <a th:href="@{/products}">Sản phẩm</a> >
    <span>Chi tiết sản phẩm</span>
</div>
<div id="overlay"></div>
<div th:replace="~{fragments/sidebar :: aside}"></div>

<div class="product-detail-container" th:attr="data-active=${product.active}">

    <div class="gallery">
        <div class="main-img" style="position: relative;">
            <img id="mainImg" th:src="@{${product.imageUrl}}"
                 th:style="${!product.active} ? 'filter: grayscale(1) opacity(0.5);' : ''">

            <div th:if="${!product.active}" class="product-inactive-overlay">
                <span>Sản phẩm hiện đã ẩn</span>
            </div>
        </div>

        <div class="thumbs">
            <img th:each="img, i : ${product.images}" th:src="@{${img}}"
                 th:classappend="${i.index == 0} ? 'active'" onclick="changeImg(this)">
        </div>
    </div>

    <div class="info-detail">
        <button class="favorite-btn">
            <i class="fa-regular fa-star"></i>
        </button>
        <h2 th:text="${product.name}"></h2>

        <div class="product-tags" th:if="${product.tags != null and !#lists.isEmpty(product.tags)}">
            <a th:each="t : ${product.tags}"
               th:href="@{/products(tag=${t.slug})}"
               class="tag-item-link">
                <span class="tag-badge">
                    <i class="fas fa-tag"></i>
                    <span th:text="${t.name}"></span>
                </span>
            </a>
        </div>

        <div class="price" id="price">Chọn phiên bản</div>
        <p th:text="${product.description}"></p>

        <div class="variant-group">
            <b>Màu sắc:</b><br>
            <button th:each="c : ${colors}" th:text="${c}" th:attr="data-color=${c}"
                    onclick="selectOption(this, 'color')">
            </button>
        </div>

        <div class="variant-group" th:if="${not #lists.isEmpty(roms) and roms[0] != null and roms[0] != ''}">
            <b>Bộ nhớ:</b><br>
            <button th:each="r : ${roms}" th:if="${r != null and r != ''}"
                    th:text="${r}" th:attr="data-rom=${r}"
                    onclick="selectOption(this, 'rom')">
            </button>
        </div>

        <div class="variant-group" th:if="${not #lists.isEmpty(rams) and rams[0] != null and rams[0] != ''}">
            <b>RAM:</b><br>
            <button th:each="r : ${rams}" th:if="${r != null and r != ''}"
                    th:text="${r}" th:attr="data-ram=${r}"
                    onclick="selectOption(this, 'ram')">
            </button>
        </div>

        <div id="stock"></div>

        <div class="actions">
            <button class="add-cart-btn" onclick="addToCart()">
                <i class="fa-solid fa-cart-arrow-down"></i>
                Thêm vào giỏ hàng
            </button>
            <button class="buy-btn" onclick="buyNow()">Mua ngay</button>
        </div>

        <input type="hidden" id="variantId">
    </div>

</div>

<div th:each="v : ${variants}" class="variant-item"
     th:attr="data-id=${v.variantId},
              data-color=${v.colorName},
              data-ram=${v.ramSize ?: ''},
              data-rom=${v.romSize ?: ''},
              data-price=${v.price},
              data-stock=${v.stockQty}">
</div>

<div class="related-products-wrapper">
    <div class="products" id="relatedProducts"></div>

    <div id="relatedProductsData" style="display:none;">
        <div th:each="p : ${relatedProducts}"
             th:attr="data-id=${p.productId}, data-name=${p.name}, data-desc=${p.description}, data-img=${p.imageUrl}">
        </div>
    </div>

    <button id="loadMoreBtn" th:if="${relatedProducts.size() > 5}">Xem thêm</button>
</div>

<form id="addToCartForm" th:action="@{/cart/add}" method="post">
    <input type="hidden" name="cartId" th:value="${cartId}">
    <input type="hidden" name="variantId" id="variantIdForm">
    <input type="hidden" name="quantity" value="1">
</form>

<div id="success-box" class="error-box" style="display:none;">
    <p style="background:#2e7d32;border:none;">
        <i class="fa-solid fa-check"></i>
        <span id="success-text"></span>
    </p>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/user/common.js}"></script>
<script th:src="@{/js/user/product-detail.js}"></script>
</body>

</html>
