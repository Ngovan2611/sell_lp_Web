<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách sản phẩm</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/user/common.css}">
    <link rel="stylesheet" th:href="@{/css/user/products.css}">
    <link rel="stylesheet" th:href="@{/css/user/sidebar.css}">
</head>

<body>
<div th:replace="~{fragments/header :: header}"></div>
<div id="overlay"></div>

<div class="breadcrumb">
    <a th:href="@{/home}">Trang chủ</a> >
    <span>Sản phẩm</span>
</div>

<div th:replace="~{fragments/sidebar :: aside}"></div>

<h2 style="text-align:center">Danh sách sản phẩm</h2>

<div class="filter-container">

    <form th:action="@{/products}" method="get" class="filter-form">

        <input type="hidden" name="categoryId" th:value="${categoryId}">

        <input type="hidden" name="tag" th:value="${currentTag}">

        <div class="search-box">
            <input type="text"
                   name="keyword"
                   th:value="${keyword}"
                   placeholder="Tìm laptop...">

            <button type="submit">
                <i class="fa-solid fa-search"></i>
            </button>
        </div>

        <select name="price" class="filter-select">
            <option value="">Mọi mức giá</option>
            <option value="1" th:selected="${price == '1'}">Dưới 10 triệu</option>
            <option value="2" th:selected="${price == '2'}">10 - 20 triệu</option>
            <option value="3" th:selected="${price == '3'}">Trên 20 triệu</option>
        </select>

        <select name="sort" class="filter-select">
            <option value="newest" th:selected="${sort == 'newest'}">Mới nhất</option>
            <option value="price_asc" th:selected="${sort == 'price_asc'}">Giá thấp đến cao</option>
            <option value="price_desc" th:selected="${sort == 'price_desc'}">Giá cao đến thấp</option>
            <option value="name_asc" th:selected="${sort == 'name_asc'}">Tên A-Z</option>
        </select>

        <button class="apply-filter-btn" type="submit">
            <i class="fa-solid fa-filter"></i> Lọc
        </button>

    </form>

</div>

<div class="products">
    <div class="product" th:each="p : ${products}">
        <button class="favorite-btn">
            <i class="fa-regular fa-star"></i>
        </button>
        <img th:src="${p.imageUrl}">

        <h3 th:text="${p.name}"></h3>

        <div class="product-price">
            <span class="price-min"
                  th:text="${#numbers.formatDecimal(p.minPrice, 0, 'COMMA', 0, 'POINT')} + 'đ'">
            </span>
        </div>

        <p th:text="${p.description}"></p>

        <a th:href="@{/product/{id}(id=${p.productId})}" class="view-link main-link">
            <button class="view-btn">Xem chi tiết</button>
        </a>
    </div>
</div>

<div class="pagination" th:if="${totalPages > 1}">
    <a th:if="${currentPage > 0}"
       th:href="@{/products(categoryId=${categoryId}, keyword=${keyword}, price=${price}, tag=${currentTag}, sort=${sort}, page=${currentPage-1})}">
        <i class="fa-solid fa-chevron-left"></i>
    </a>

    <a th:href="@{/products(categoryId=${categoryId}, keyword=${keyword}, price=${price}, tag=${currentTag}, sort=${sort}, page=0)}"
       th:classappend="${currentPage == 0} ? 'active' : ''">1</a>

    <span th:if="${currentPage > 2}">...</span>

    <span th:each="i : ${#numbers.sequence(currentPage > 0 ? currentPage-1 : 0, currentPage+1 < totalPages ? currentPage+1 : totalPages-1)}"
          th:if="${i > 0 and i < totalPages-1}">
        <a th:href="@{/products(categoryId=${categoryId}, keyword=${keyword}, price=${price}, tag=${currentTag}, sort=${sort}, page=${i})}"
           th:text="${i + 1}"
           th:classappend="${i == currentPage} ? 'active' : ''"></a>
    </span>

    <span th:if="${currentPage < totalPages - 3}">...</span>

    <a th:href="@{/products(categoryId=${categoryId}, keyword=${keyword}, price=${price}, tag=${currentTag}, sort=${sort}, page=${totalPages-1})}"
       th:text="${totalPages}"
       th:classappend="${currentPage == totalPages-1} ? 'active' : ''"></a>

    <a th:if="${currentPage < totalPages - 1}"
       th:href="@{/products(categoryId=${categoryId}, keyword=${keyword}, price=${price}, tag=${currentTag}, sort=${sort}, page=${currentPage+1})}">
        <i class="fa-solid fa-chevron-right"></i>
    </a>
</div>

<div class="no-results" th:if="${#lists.isEmpty(products)}">
    <div class="no-results-inner">
        <div class="icon-box">
            <i class="fa-solid fa-magnifying-glass"></i>
        </div>
        <h3 th:if="${keyword != null and !keyword.isEmpty()}">
            Rất tiếc, không tìm thấy sản phẩm nào khớp với từ khóa "[[${keyword}]]"
        </h3>
        <h3 th:if="${keyword == null or keyword.isEmpty()}">
            Danh mục này hiện chưa có sản phẩm nào
        </h3>
        <p>Hãy thử kiểm tra lại lỗi chính tả hoặc tìm bằng từ khóa khác.</p>
        <a th:href="@{/products}" class="back-to-all">
            <i class="fa-solid fa-arrow-left"></i> Xem tất cả sản phẩm
        </a>
    </div>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/user/common.js}"></script>

</body>
</html>
