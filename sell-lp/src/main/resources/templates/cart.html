<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Giỏ hàng</title>
    <link rel="stylesheet" th:href="@{/css/cart.css}">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<div th:replace="~{fragments/header :: header}"></div>

<div id="overlay"></div>
<div th:replace="~{fragments/sidebar :: aside}"></div>
<div class="breadcrumb">
    <a th:href="@{/home}">Trang chủ</a>  >
    <span>Giỏ hàng của bạn</span>
</div>
<body>
    <div class="cart-container">
        <h2>Giỏ hàng của bạn</h2>
        <div class="cart-box" id="cartBox">

            <div th:if="${#lists.size(cartItems) > 0}">
                <div class="cart-item"
                     th:each="item : ${cartItems}"
                     th:attr="data-cart-item-id=${item.cartItemId}">

                    <input type="checkbox" class="select-item"
                           th:value="${item.cartItemId}"
                           th:attr="data-price=${item.quantity * item.variant.price}"
                           onchange="updateTotal()" />

                    <img th:src="${#lists.isEmpty(item.variant.product.images)
             ? '/images/default-product.jpg'
             : item.variant.product.images[0].url}"
                         alt="Product Image" />

                    <div class="item-info">
                        <strong th:text="${item.variant.product.name}">Tên sản phẩm</strong>
                        <br/>
                        <small class="text-muted" th:text="${item.variant.color?.colorName
                            + (item.variant.ram != null ? ' / ' + item.variant.ram.ramSize + 'GB RAM' : '')
                            + (item.variant.rom != null ? ' / ' + item.variant.rom.romSize + 'GB ROM' : '')}">
                        </small>
                    </div>

                    <div class="item-quantity">
                        <button onclick="changeQty(this, -1)">-</button>
                        <input type="number" th:value="${item.quantity}" min="1">
                        <button onclick="changeQty(this, 1)">+</button>
                    </div>

                    <div class="item-price"
                         th:attr="data-unit-price=${item.variant.price}"
                         th:text="${#numbers.formatDecimal(item.quantity * item.variant.price, 0, 'COMMA', 0, 'POINT')} + 'đ'">
                    </div>

                    <button class="remove-btn" onclick="removeItem(this)">Xóa</button>
                </div>
            </div>

            <div class="empty-cart" th:if="${#lists.isEmpty(cartItems)}">
                <i class="fa-solid fa-cart-shopping"></i>
                <p>Giỏ hàng của bạn đang trống</p>
            </div>

        </div>

        <div class="cart-summary">
            <div class="summary-info">
                <p>Tổng sản phẩm: <span id="totalQuantity">0</span></p>
                <p>Tổng tiền: <span id="totalPrice">0đ</span></p>
            </div>
            <button class="checkout-btn" onclick="goToCheckout()">Thanh toán</button>
        </div>
    </div>
    <div id="error-box" class="error-box">
        <i class="fa-solid fa-triangle-exclamation"></i>
        <span id="error-text"></span>
    </div>
    <script th:src="@{/js/common.js}"></script>
    <script th:src="@{/js/cart.js}"></script>
</body>
</html>
