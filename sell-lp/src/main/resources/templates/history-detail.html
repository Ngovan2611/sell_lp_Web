<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết đơn hàng</title>

    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/history-detail.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>
<div id="overlay"></div>
<div th:replace="~{fragments/sidebar :: aside}"></div>
<div class="breadcrumb">
    <a th:href="@{/home}">Trang chủ</a>  >
    <a th:href="@{/history-order}">Lịch sử đặt hàng</a>  >
    <span>Chi tiết đơn hàng</span>
</div>
<div class="container">

    <div class="order-box">

        <div class="order-header">
            <div>
                <h2>Đơn hàng #<span th:text="${order.orderId}"></span></h2>
                <p class="order-date">
                    Ngày đặt:
                    <span th:text="${#dates.format(order.orderDate,'dd/MM/yyyy HH:mm')}"></span>
                </p>
            </div>

            <div class="order-status"
                 th:classappend="${order.status == 'PENDING'} ? 'status-pending' :
                         (${order.status == 'SUCCESS'} ? 'status-success' : 'status-failure')">

        <span th:text="${order.status == 'PENDING' ? 'Chờ xử lý' :
          (order.status == 'SUCCESS' ? 'Thành công' : 'Thất bại')}"></span>
            </div>
        </div>

        <!-- ADDRESS -->
        <div class="address-box">
            <div class="address-title">
                <i class="fa-solid fa-location-dot"></i>
                <span>Địa chỉ nhận hàng</span>
            </div>

            <div class="address-content">
                <p class="name">
                    <b th:text="${order.recipientName}"></b>
                    <span th:text="${order.phone}"></span>
                </p>
                <p class="full-address" th:text="${order.fullAddress}"></p>
            </div>
        </div>

        <!-- ITEMS -->
        <div class="items-box">
            <div th:each="item : ${order.items}" class="order-item">
                <img th:src="${item.imageUrl}">

                <div class="item-info">
                    <b th:text="${item.productName}"></b>
                    <p th:text="${item.variantName}"></p>
                    <p>x<span th:text="${item.quantity}"></span></p>
                </div>

                <div class="item-price">
                    <span th:text="${#numbers.formatDecimal(item.unitPrice,0,'COMMA',0,'POINT')}"></span> đ
                </div>
            </div>
        </div>

        <!-- SUMMARY -->
        <div class="summary">
            <div class="row">
                <span>Tạm tính</span>
                <span th:text="${#numbers.formatDecimal(order.totalAmount,0,'COMMA',0,'POINT')} + 'đ'"></span>
            </div>

            <div class="row total">
                <span>Tổng tiền</span>
                <span th:text="${#numbers.formatDecimal(order.totalAmount,0,'COMMA',0,'POINT')} + 'đ'"></span>
            </div>
        </div>

    </div>

    <div class="actions">

        <a href="/history-order" class="btn-back">
            <i class="fa-solid fa-left-long"></i>
            Quay lại
        </a>

        <button class="btn-cancel"
                th:if="${order.status == 'PENDING'}"
                th:attr="data-id=${order.orderId}">
            Hủy đơn
        </button>

    </div>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script>
    document.querySelectorAll('.btn-cancel').forEach(btn => {
        btn.addEventListener('click', function () {

            const orderId = this.dataset.id;

            if (!confirm("Bạn có chắc muốn hủy đơn hàng này không?")) return;

            fetch('/cancel/' + orderId, {
                method: 'POST'
            })
                .then(res => {
                    if (res.ok) {
                        alert("Hủy đơn thành công");
                        location.reload();
                    } else {
                        alert("Không thể hủy đơn");
                    }
                })
                .catch(() => alert("Lỗi hệ thống"));
        });
    });
</script>
</body>
</html>
