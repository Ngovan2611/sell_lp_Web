<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Đổi mật khẩu</title>

    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/common.css}">
</head>

<style>
    body {
        margin: 0;
        font-family: "Poppins", sans-serif;
        background: #f3f4f6;
    }

    .container {
        width: 500px;
        max-width: 95%;
        margin: 80px auto;

        background: #fff;
        padding: 50px;

        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h2 {
        text-align: center;
        margin-bottom: 10px;
    }

    p {
        text-align: center;
        color: #6b7280;
        font-size: 14px;
    }

    .input-group {
        position: relative;
        margin-top: 18px;
    }

    .input-group input {
        width: 100%;
        height: 46px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        padding: 14px 42px;
        font-size: 14px;
        background: #fafafa;
        outline: none;
        transition: 0.2s;
    }

    .input-group input:focus {
        border-color: #2563eb;
        background: #fff;
        box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
    }

    .input-group label {
        position: absolute;
        left: 42px;
        top: 50%;
        transform: translateY(-50%);
        background: #fff;
        padding: 0 6px;
        color: #9ca3af;
        font-size: 14px;
        transition: 0.2s;
    }

    .input-group input:focus + label,
    .input-group input:not(:placeholder-shown) + label {
        top: 0;
        font-size: 12px;
        color: #2563eb;
        font-weight: 500;
    }


    .input-group i {
        position: absolute;
        top: 50%;
        left: 14px;
        transform: translateY(-50%);
        color: #9ca3af;
    }


    .toggle {
        left: auto !important;
        right: 14px;
        cursor: pointer;
    }


    .btn-login {
        width: 100%;
        height: 46px;
        margin-top: 22px;
        background: #1766ce;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn-login:hover {
        background: #0e3b71;
        transform: translateY(-1px);
    }

    .error-box {
        position: absolute;
        top: 100%;
        left: 50%;
        transform: translate(-50%, -10px);

        width: 100%;
        display: flex;
        justify-content: center;

        opacity: 0;
        pointer-events: none;
        transition: all 0.3s ease;
        z-index: 10;
    }

    .error-box.show {
        opacity: 1;
        transform: translate(-50%, 0);
    }

    .error-box p {
        background: #fee2e2;
        color: #b91c1c;
        border: 1px solid #fecaca;

        padding: 10px 16px;
        border-radius: 8px;
        font-size: 14px;

        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .breadcrumb{
        background:#f5f5f5;
        padding:12px 60px;
        font-size:14px;
    }

    .breadcrumb a{
        text-decoration:none;
        color:#333;
    }

    .breadcrumb span{
        color:#c40000;
    }
    .password-hint {
        margin-top: 8px;
        margin-left: 5px;

        font-size: 13px;
        color: #9ca3af;

        display: flex;
        align-items: center;
        gap: 6px;
    }
    .input-group input:focus ~ .password-hint {
        color: #2563eb;
    }
    form {
        position: relative;
    }

</style>

<body>

<!-- HEADER -->
<div th:replace="~{fragments/header :: header}"></div>
<div id="overlay"></div>

<div th:replace="~{fragments/sidebar :: aside}"></div>

<div class="breadcrumb">
    <a th:href="@{/home}">Trang chủ</a>  >  <span>Đổi mật khẩu</span>
</div>
<div class="container">

    <h2>Đổi mật khẩu</h2>

    <form th:action="@{/change-password}" method="post" id="form-change">

        <div class="input-group" th:if="${provider == 'LOCAL'}">
            <i class='bx bx-lock'></i>
            <input type="password" id="oldPassword" name="oldPassword" placeholder=" ">
            <label>Mật khẩu hiện tại</label>
            <i class='bx bx-show toggle' onclick="togglePassword('oldPassword')"></i>
        </div>

        <!-- Mật khẩu mới -->
        <div class="input-group">
            <i class='bx bx-lock'></i>
            <input type="password" id="newPassword" name="newPassword" placeholder=" " required>
            <label>Mật khẩu mới</label>
            <i class='bx bx-show toggle' onclick="togglePassword('newPassword')"></i>
        </div>

        <!-- Xác nhận -->
        <div class="input-group">
            <i class='bx bx-lock'></i>
            <input type="password" id="confirmPassword" name="confirmPassword" placeholder=" " required>
            <label>Xác nhận mật khẩu</label>
            <i class='bx bx-show toggle' onclick="togglePassword('confirmPassword')"></i>
        </div>
        <p class="password-hint">
            <i class='bx bx-info-circle'></i>
            Mật khẩu chứa ít nhất 8 kí tự
        </p>


        <button type="submit" class="btn-login">Đổi mật khẩu</button>

        <div th:if="${error}" class="error-box show" id="error-box">
            <p th:text="${error}"></p>
        </div>

<!--        <div th:if="${success}" class="error-box">-->
<!--            <p style="background:#dcfce7;color:#166534;border:1px solid #bbf7d0"-->
<!--               th:text="${success}">-->
<!--            </p>-->
<!--        </div>-->

    </form>

</div>

<!-- FOOTER -->
<div th:replace="~{fragments/footer :: footer}"></div>

<script>
    function togglePassword(id) {
        const input = document.getElementById(id);
        input.type = input.type === "password" ? "text" : "password";
    }

    document.getElementById("form-change").addEventListener("submit", function (e) {
        const pass = document.getElementById("newPassword").value;
        const confirm = document.getElementById("confirmPassword").value;

        if (pass.length < 8) {
            e.preventDefault();
            alert("Mật khẩu phải có ít nhất 8 ký tự!");
            return;
        }

        if (pass !== confirm) {
            e.preventDefault();
            alert("Mật khẩu xác nhận không khớp!");
        }
    });
    window.addEventListener("DOMContentLoaded", () => {
        const errorBox = document.getElementById("error-box");

        if (errorBox) {
            setTimeout(() => {
                errorBox.classList.remove("show");
            }, 3000);
        }
    });
</script>

<script th:src="@{/js/common.js}"></script>

</body>
</html>
